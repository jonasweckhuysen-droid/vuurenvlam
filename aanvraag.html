<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bezoek aanvragen</title>

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(160deg, #ff6a00, #ffb347);
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
      max-width: 500px;
      margin: auto;
    }

    .card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border-radius: 25px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    img {
      width: 100%;
      border-radius: 20px;
      margin-bottom: 15px;
    }

    .input-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border-radius: 15px;
      border: none;
      font-size: 16px;
    }

    select {
      background: white;
      color: #333;
      appearance: none;
    }

    .btn {
      margin-top: 20px;
      padding: 15px;
      width: 100%;
      background: white;
      color: #ff6a00;
      border-radius: 20px;
      font-size: 18px;
      border: none;
      font-weight: bold;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
    }

    .btn:hover {
      transform: scale(1.03);
    }

    .back-btn {
      margin-top: 40px;
    }
  </style>
</head>

<body>

<header>📅 Bezoek aanvragen</header>

<div class="container">
  <div class="card">

    <img src="mascotte.png" alt="Mascotte">

    <form id="aanvraagForm">

      <div class="input-group">
        <label>🏫 Schoolnaam</label>
        <input type="text" id="school" required>
      </div>

      <div class="input-group">
        <label>👤 Naam begeleider</label>
        <input type="text" id="begeleider" required>
      </div>

      <div class="input-group">
        <label>📧 E-mail</label>
        <input type="email" id="email" required>
      </div>

      <div class="input-group">
        <label>📱 GSM nummer begeleider</label>
        <input type="tel" id="gsm" required>
      </div>

      <div class="input-group">
        <label>👨‍👩‍👧‍👦 Aantal kinderen</label>
        <input type="number" id="aantal" required>
      </div>

      <div class="input-group">
        <label>🚒 Kies een brandweerpost</label>
        <select id="postSelect" required>
          <option value="">-- Kies een post --</option>
          <option value="1">Post Balen</option>
          <option value="2">Post Geel</option>
          <option value="3">Post Grobbendonk</option>
          <option value="4">Post Herentals</option>
          <option value="5">Post Herenthout</option>
          <option value="6">Post Mol</option>
          <option value="7">Post Westerlo</option>
        </select>
      </div>

      <div class="input-group">
        <label>📆 Kies een datum & uur</label>
        <select id="datumSelect" required>
          <option value="">-- Kies datum & uur --</option>
        </select>
      </div>

      <button class="btn">Aanvraag versturen 🔥</button>

    </form>

  </div>

  <a href="index.html" class="btn back-btn">
    <span class="material-symbols-rounded">arrow_back</span>
    Terug
  </a>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const supabaseUrl = "https://elmkjlqcsshctmnbqbfq.supabase.co";
  const supabaseKey = "sb_publishable_yROKuvppBKGe-bdXd_6hzQ_w2V2v77i";
  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

  const select = document.getElementById("datumSelect");

  // 🔥 DYNAMISCHE DATUMS LADEN
  async function laadBeschikbareSlots() {

    // 1. Haal alle beschikbare datums op
    const { data: datums, error: err1 } = await supabase
      .from("beschikbare_datums")
      .select("*")
      .order('datum', { ascending: true })
      .order('tijd', { ascending: true });

    if (err1) { console.error(err1); return; }

    // 2. Haal alle reeds ingenomen slots op
    const { data: bezetData, error: err2 } = await supabase
      .from("aanvragen")
      .select("datum, tijd");

    if (err2) { console.error(err2); return; }

    // 3. Dropdown leegmaken
    select.innerHTML = '<option value="">-- Kies datum & uur --</option>';

    // 4. Beschikbare datums tonen
    datums.forEach(item => {

      // Check of slot al ingenomen is
      const isBezet = bezetData.some(b => b.datum === item.datum && b.tijd === item.tijd);
      if (isBezet) return;

      const key = item.datum + " - " + item.tijd;

      const option = document.createElement("option");
      option.value = key;
      option.textContent = `🔥 ${item.datum} om ${item.tijd}`;

      select.appendChild(option);
    });
  }

  laadBeschikbareSlots();

  // 🔥 FORM SUBMIT
  document.getElementById("aanvraagForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    if (!select.value) {
      alert("Kies eerst een datum & uur!");
      return;
    }

    const [datum, tijd] = select.value.split(" - ");

    const data = {
      school: document.getElementById("school").value,
      begeleider: document.getElementById("begeleider").value,
      email: document.getElementById("email").value,
      gsm: document.getElementById("gsm").value,
      aantal: parseInt(document.getElementById("aantal").value),
      datum: datum,
      tijd: tijd,
      post_nummer: parseInt(document.getElementById("postSelect").value),
      status: "nieuw"
    };

    // 🔴 EXTRA CHECK TEGEN DUBBEL BOEKEN
    const { data: bestaande } = await supabase
      .from("aanvragen")
      .select("id")
      .eq("datum", datum)
      .eq("tijd", tijd);

    if (bestaande.length > 0) {
      alert("Dit tijdslot is net al ingenomen!");
      laadBeschikbareSlots();
      return;
    }

    const { error } = await supabase.from("aanvragen").insert([data]);

    if (error) {
      alert("Fout bij verzenden 😢: " + error.message);
      console.error(error);
    } else {
      window.location.href = "bedankt.html";
    }
  });

});
</script>

</body>
</html>
