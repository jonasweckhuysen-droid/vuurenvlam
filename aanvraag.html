<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bezoek aanvragen</title>

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(160deg, #ff6a00, #ffb347);
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
      max-width: 500px;
      margin: auto;
    }

    .card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border-radius: 25px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    img {
      width: 100%;
      border-radius: 20px;
      margin-bottom: 15px;
    }

    .input-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border-radius: 15px;
      border: none;
      font-size: 16px;
      box-sizing: border-box;
    }

    select {
      background: white;
      color: #333;
      appearance: none;
    }

    .info-note {
      margin-top: 8px;
      font-size: 14px;
      color: rgba(255,255,255,0.95);
      white-space: pre-line;
    }

    .debug-box {
      margin-top: 15px;
      padding: 12px;
      border-radius: 14px;
      background: rgba(0,0,0,0.25);
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .btn {
      margin-top: 20px;
      padding: 15px;
      width: 100%;
      background: white;
      color: #ff6a00;
      border-radius: 20px;
      font-size: 18px;
      border: none;
      font-weight: bold;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      cursor: pointer;
    }

    .btn:hover {
      transform: scale(1.03);
    }

    .back-btn {
      margin-top: 40px;
    }
  </style>
</head>

<body>

<header>📅 Bezoek aanvragen</header>

<div class="container">
  <div class="card">

    <img src="mascotte.png" alt="Mascotte">

    <form id="aanvraagForm">

      <div class="input-group">
        <label>🏫 Schoolnaam</label>
        <input type="text" id="school" required>
      </div>

      <div class="input-group">
        <label>👤 Naam begeleider</label>
        <input type="text" id="begeleider" required>
      </div>

      <div class="input-group">
        <label>📧 E-mail</label>
        <input type="email" id="email" required>
      </div>

      <div class="input-group">
        <label>📱 GSM nummer begeleider</label>
        <input type="tel" id="gsm" required>
      </div>

      <div class="input-group">
        <label>👨‍👩‍👧‍👦 Aantal kinderen</label>
        <input type="number" id="aantal" min="1" required>
      </div>

      <div class="input-group">
        <label>🚒 Kies een brandweerpost</label>
        <select id="postSelect" required>
          <option value="">-- Kies een post --</option>
        </select>
      </div>

      <div class="input-group">
        <label>📆 Kies een datum & uur</label>
        <select id="datumSelect" required>
          <option value="">-- Kies eerst een post --</option>
        </select>
        <div class="info-note" id="slotInfo"></div>
        <div class="debug-box" id="debugBox">Debug info verschijnt hier...</div>
      </div>

      <button type="submit" class="btn">Aanvraag versturen 🔥</button>

    </form>

  </div>

  <a href="index.html" class="btn back-btn">
    <span class="material-symbols-rounded">arrow_back</span>
    Terug
  </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const supabaseUrl = "https://elmkjlqcsshctmnbqbfq.supabase.co";
  const supabaseKey = "sb_publishable_yROKuvppBKGe-bdXd_6hzQ_w2V2v77i";
  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

  const postSelect = document.getElementById("postSelect");
  const datumSelect = document.getElementById("datumSelect");
  const slotInfo = document.getElementById("slotInfo");
  const debugBox = document.getElementById("debugBox");
  const form = document.getElementById("aanvraagForm");

  function normaliseerTijd(tijd) {
    if (!tijd) return "";
    return String(tijd).substring(0, 5);
  }

  function setDebug(title, data) {
    debugBox.textContent = title + "\n\n" + JSON.stringify(data, null, 2);
  }

  async function laadPosten() {
    const { data, error } = await supabase
      .from("posten")
      .select("id, naam, icoon")
      .order("id", { ascending: true });

    if (error) {
      console.error("Fout bij laden posten:", error);
      slotInfo.textContent = "Fout bij laden van de posten.";
      setDebug("Fout bij laden posten", error);
      return;
    }

    postSelect.innerHTML = '<option value="">-- Kies een post --</option>';

    (data || []).forEach(post => {
      const option = document.createElement("option");
      option.value = String(post.id);
      option.textContent = `${post.icoon || "🚒"} ${post.naam}`;
      postSelect.appendChild(option);
    });

    setDebug("Posten geladen", data);
  }

  async function laadBeschikbareSlots() {
    const gekozenPostId = Number(postSelect.value);

    datumSelect.innerHTML = '<option value="">-- Kies datum & uur --</option>';
    slotInfo.textContent = "";

    if (!gekozenPostId) {
      datumSelect.innerHTML = '<option value="">-- Kies eerst een post --</option>';
      setDebug("Geen post gekozen", { gekozenPostId });
      return;
    }

    const { data: datums, error: err1 } = await supabase
      .from("beschikbare_datums")
      .select("id, datum, tijd, post_id")
      .eq("post_id", gekozenPostId)
      .order("datum", { ascending: true })
      .order("tijd", { ascending: true });

    if (err1) {
      console.error("Fout bij laden beschikbare datums:", err1);
      slotInfo.textContent = "Fout bij laden van de beschikbare datums.";
      setDebug("Fout bij query beschikbare_datums", err1);
      return;
    }

    const { data: bezetData, error: err2 } = await supabase
      .from("aanvragen")
      .select("id, datum, tijd, post_id, status")
      .eq("post_id", gekozenPostId);

    if (err2) {
      console.error("Fout bij laden ingenomen slots:", err2);
      slotInfo.textContent = "Fout bij laden van de reeds ingenomen slots.";
      setDebug("Fout bij query aanvragen", err2);
      return;
    }

    const vrijeSlots = (datums || []).filter(item => {
      const isBezet = (bezetData || []).some(b => {
        const zelfdePost = Number(b.post_id) === gekozenPostId;
        const zelfdeDatum = String(b.datum) === String(item.datum);
        const zelfdeTijd = normaliseerTijd(b.tijd) === normaliseerTijd(item.tijd);
        const status = String(b.status || "").toLowerCase().trim();

        return (
          zelfdePost &&
          zelfdeDatum &&
          zelfdeTijd &&
          status !== "afgekeurd" &&
          status !== "geweigerd"
        );
      });

      return !isBezet;
    });

    setDebug("Debug laadBeschikbareSlots", {
      gekozenPostId,
      datums,
      bezetData,
      vrijeSlots
    });

    if (!datums || datums.length === 0) {
      datumSelect.innerHTML = '<option value="">-- Geen vrije momenten beschikbaar --</option>';
      slotInfo.textContent = "Geen records gevonden in beschikbare_datums voor deze post.";
      return;
    }

    if (vrijeSlots.length === 0) {
      datumSelect.innerHTML = '<option value="">-- Geen vrije momenten beschikbaar --</option>';
      slotInfo.textContent = "Voor deze post zijn momenteel geen vrije datums beschikbaar.";
      return;
    }

    vrijeSlots.forEach(item => {
      const datum = String(item.datum);
      const tijd = normaliseerTijd(item.tijd);
      const key = `${datum}|${tijd}`;

      const option = document.createElement("option");
      option.value = key;
      option.textContent = `🔥 ${datum} om ${tijd}`;
      datumSelect.appendChild(option);
    });

    slotInfo.textContent = `${vrijeSlots.length} vrije moment(en) gevonden.`;
  }

  postSelect.addEventListener("change", laadBeschikbareSlots);

  form.addEventListener("submit", async function(e) {
    e.preventDefault();

    if (!postSelect.value) {
      alert("Kies eerst een brandweerpost.");
      return;
    }

    if (!datumSelect.value || !datumSelect.value.includes("|")) {
      alert("Kies eerst een geldig datum- en tijdslot.");
      return;
    }

    const [datum, ruweTijd] = datumSelect.value.split("|");
    const tijd = normaliseerTijd(ruweTijd);
    const postId = Number(postSelect.value);
    const datum_tijd = `${datum}T${tijd}:00`;

    const aanvraagData = {
      school: document.getElementById("school").value.trim(),
      begeleider: document.getElementById("begeleider").value.trim(),
      email: document.getElementById("email").value.trim(),
      gsm: document.getElementById("gsm").value.trim(),
      aantal: parseInt(document.getElementById("aantal").value, 10),
      datum: datum,
      tijd: tijd,
      datum_tijd: datum_tijd,
      post_id: postId,
      status: "Nieuw"
    };

    const { data: bestaande, error: checkError } = await supabase
      .from("aanvragen")
      .select("id, status, tijd")
      .eq("post_id", postId)
      .eq("datum", datum);

    if (checkError) {
      console.error("Fout bij controle bestaande aanvraag:", checkError);
      alert("Fout bij controle van bestaande aanvragen.");
      setDebug("Fout bij controle bestaande aanvraag", checkError);
      return;
    }

    const effectiefBezet = (bestaande || []).some(item => {
      const status = String(item.status || "").toLowerCase().trim();
      const zelfdeTijd = normaliseerTijd(item.tijd) === tijd;
      return zelfdeTijd && status !== "afgekeurd" && status !== "geweigerd";
    });

    if (effectiefBezet) {
      alert("Dit tijdslot is net al ingenomen voor deze post.");
      await laadBeschikbareSlots();
      return;
    }

    const { error } = await supabase
      .from("aanvragen")
      .insert([aanvraagData]);

    if (error) {
      console.error("Insert fout:", error);
      alert("Fout bij verzenden 😢: " + error.message);
      setDebug("Insert fout", error);
      return;
    }

    window.location.href = "bedankt.html";
  });

  laadPosten();
});
</script>

</body>
</html>
