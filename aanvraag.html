<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bezoek aanvragen</title>

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(160deg, #ff6a00, #ffb347);
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
      max-width: 500px;
      margin: auto;
    }

    .card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border-radius: 25px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    img {
      width: 100%;
      border-radius: 20px;
      margin-bottom: 15px;
    }

    .input-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border-radius: 15px;
      border: none;
      font-size: 16px;
    }

    select {
      background: white;
      color: #333;
      appearance: none;
    }

    .btn {
      margin-top: 20px;
      padding: 15px;
      width: 100%;
      background: white;
      color: #ff6a00;
      border-radius: 20px;
      font-size: 18px;
      border: none;
      font-weight: bold;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
    }

    .btn:hover {
      transform: scale(1.03);
    }

    .back-btn {
      margin-top: 40px;
    }
  </style>
</head>

<body>

<header>📅 Bezoek aanvragen</header>

<div class="container">
  <div class="card">

    <img src="mascotte.png" alt="Mascotte">

    <form id="aanvraagForm">

      <div class="input-group">
        <label>🏫 Schoolnaam</label>
        <input type="text" required>
      </div>

      <div class="input-group">
        <label>👤 Naam begeleider</label>
        <input type="text" required>
      </div>

      <div class="input-group">
        <label>📧 E-mail</label>
        <input type="email" required>
      </div>

      <div class="input-group">
        <label>📱 GSM nummer begeleider</label>
        <input type="tel" required>
      </div>

      <div class="input-group">
        <label>👨‍👩‍👧‍👦 Aantal kinderen</label>
        <input type="number" required>
      </div>

      <div class="input-group">
        <label>📆 Kies een datum</label>
        <select id="datumSelect" required>
          <option value="">-- Kies datum & uur --</option>
        </select>
      </div>

      <button class="btn">Aanvraag versturen 🔥</button>

    </form>

  </div>

  <a href="index.html" class="btn back-btn">
    <span class="material-symbols-rounded">arrow_back</span>
    Terug
  </a>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const supabaseUrl = "https://elmkjlqcsshctmnbqbfq.supabase.co";
  const supabaseKey = "sb_publishable_yROKuvppBKGe-bdXd_6hzQ_w2V2v77i";
  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

  const beschikbareDatums = [
    "10 april 2026",
    "15 april 2026",
    "22 april 2026",
    "5 mei 2026"
  ];

  const tijdsblokken = ["10:00", "13:30"];
  const select = document.getElementById("datumSelect");

  // 🔥 SLOTS LADEN (EN VOLLE VERWIJDEREN)
  async function laadBeschikbareSlots() {

    const { data, error } = await supabase
      .from("aanvragen")
      .select("datum");

    if (error) {
      console.error(error);
      return;
    }

    const bezet = data.map(item => item.datum);

    select.innerHTML = '<option value="">-- Kies datum & uur --</option>';

    beschikbareDatums.forEach(datum => {
      tijdsblokken.forEach(tijd => {

        const key = datum + " - " + tijd;

        // ❌ al bezet → niet tonen
        if (bezet.includes(key)) return;

        const option = document.createElement("option");
        option.value = key;
        option.textContent = "🔥 " + datum + " om " + tijd;

        select.appendChild(option);

      });
    });
  }

  // 👉 dropdown laden bij start
  laadBeschikbareSlots();

  // 🔥 FORM SUBMIT
  document.getElementById("aanvraagForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const inputs = document.querySelectorAll("input");

    const data = {
      school: inputs[0].value,
      begeleider: inputs[1].value,
      email: inputs[2].value,
      gsm: inputs[3].value,
      aantal: parseInt(inputs[4].value),
      datum: select.value,
      status: "nieuw"
    };

    // 🔴 EXTRA CHECK TEGEN DUBBEL BOEKEN
    const { data: bestaande } = await supabase
      .from("aanvragen")
      .select("id")
      .eq("datum", data.datum);

    if (bestaande.length > 0) {
      alert("Dit tijdslot is net al ingenomen!");
      laadBeschikbareSlots();
      return;
    }

    const { error } = await supabase.from("aanvragen").insert([data]);

    if (error) {
      alert("Fout bij verzenden 😢: " + error.message);
      console.error(error);
    } else {
      window.location.href = "bedankt.html";
    }
  });

});
</script>

</body>
</html>
