<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bedankt!</title>

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(160deg, #ff6a00, #ffb347);
      color: white;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border-radius: 25px;
      padding: 25px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    img {
      width: 100%;
      border-radius: 20px;
      margin-bottom: 15px;
    }

    h2 {
      margin: 10px 0;
    }

    p {
      margin-bottom: 20px;
    }

    .home-btn {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding: 15px;
      background: white;
      color: #ff6a00;
      border-radius: 20px;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .material-symbols-rounded {
      font-size: 24px;
    }
  </style>
</head>

<body>

<div class="card">

  <img src="mascotte.png" alt="Mascotte">

  <h2>🔥 Bedankt!</h2>
  <p>Je aanvraag is succesvol verzonden.<br>
  Wij nemen zo snel mogelijk contact op!</p>

  <a href="index.html" class="home-btn">
    <span class="material-symbols-rounded">home</span>
    Terug naar begin
  </a>

</div>

</body>
</html>
