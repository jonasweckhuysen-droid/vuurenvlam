<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adminpaneel – Beheer</title>

<style>
/* -------------------------
   GLOBAL
------------------------- */
body {
  font-family:'Segoe UI';
  background: linear-gradient(160deg,#ff6a00,#ffb347);
  margin:0;
  padding:0;
}

/* -------------------------
   CONTAINER
------------------------- */
.container {
  background: rgba(255,255,255,0.15);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:25px;
  max-width:1100px;
  width:95%;
  margin:20px auto;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  color:white;
}

/* -------------------------
   HEADERS
------------------------- */
h2 {
  margin-top:0;
  text-align:center;
  font-size:26px;
}

h3 {
  margin-top:40px;
  font-size:20px;
}

/* -------------------------
   TABLE WRAPPER (MOBILE)
------------------------- */
.table-wrapper {
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  margin-top:15px;
  border-radius:15px;
}

/* -------------------------
   TABLES
------------------------- */
table {
  width:100%;
  border-collapse:collapse;
  background:white;
  color:black;
  border-radius:15px;
  overflow:hidden;
  min-width:600px; /* zorgt dat mobiel kan scrollen */
}

th, td {
  padding:12px;
  border-bottom:1px solid #ddd;
  font-size:15px;
}

th {
  background:#ff6a00;
  color:white;
}

/* -------------------------
   BUTTONS
------------------------- */
button {
  padding:10px 14px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-size:14px;
  margin:3px;
}

.btn-approve { background:green; color:white; }
.btn-block { background:red; color:white; }
.btn-admin { background:#444; color:white; }
.btn-delete { background:#b30000; color:white; }
.btn-reset { background:#0066cc; color:white; }
.btn-add { background:#ffb347; color:#000; font-weight:bold; }

.logout-btn {
  margin-top:20px;
  background:white;
  color:#ff6a00;
  font-weight:bold;
  padding:12px 20px;
  border-radius:20px;
  width:100%;
}

/* -------------------------
   MODAL
------------------------- */
.modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.6);
  z-index:100;
  padding:20px;
}

.modal-content {
  background:white;
  padding:20px;
  border-radius:15px;
  max-width:400px;
  margin:80px auto;
  color:black;
}

.modal-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.modal-body input {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  margin-top:10px;
}

.modal-actions {
  margin-top:15px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.btn-close { background:#555; color:white; }

/* -------------------------
   MOBILE OPTIMIZATION
------------------------- */
@media (max-width: 600px) {

  h2 { font-size:22px; }
  h3 { font-size:18px; }

  button {
    width:100%;
    margin-top:6px;
  }

  .modal-content {
    width:100%;
    margin-top:40px;
  }
}
</style>
</head>

<body>

<div class="container">
  <h2>👨‍🚒 Adminpaneel – Volledig beheer</h2>

  <p id="adminInfo" style="font-size:18px;"></p>

  <!-- DATUM TOEVOEGEN -->
  <button class="btn-add" onclick="openDatumModal()">📅 Nieuwe datum toevoegen</button>

  <!-- GEBRUIKERS -->
  <h3>👥 Gebruikersbeheer</h3>
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Email</th>
          <th>Naam</th>
          <th>Goedgekeurd</th>
          <th>Admin</th>
          <th>Acties</th>
        </tr>
      </thead>
      <tbody id="userTable"></tbody>
    </table>
  </div>

  <!-- AANVRAGEN -->
  <h3>🏫 Bezoekaanvragen beheren</h3>
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>School</th>
          <th>Datum</th>
          <th>Post</th>
          <th>Status</th>
          <th>Acties</th>
        </tr>
      </thead>
      <tbody id="aanvraagTable"></tbody>
    </table>
  </div>

  <!-- BESCHIKBAARHEID -->
  <h3>📅 Beschikbaarheid van gebruikers</h3>
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Email</th>
          <th>Datum</th>
          <th>Aanwezig</th>
        </tr>
      </thead>
      <tbody id="beschikbaarheidTable"></tbody>
    </table>
  </div>

  <!-- LOGS -->
  <h3>📜 Logs</h3>
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Tijd</th>
          <th>Gebruiker</th>
          <th>Actie</th>
        </tr>
      </thead>
      <tbody id="logTable"></tbody>
    </table>
  </div>

  <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<!-- MODAL DATUM TOEVOEGEN -->
<div id="datumModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>📅 Datum toevoegen</h3>
      <button class="btn-close" onclick="closeDatumModal()">X</button>
    </div>

    <div class="modal-body">
      <label>Datum</label>
      <input type="text" id="nieuweDatum" placeholder="bv. 12 mei 2026">

      <label style="margin-top:10px;">Tijdstip</label>
      <input type="text" id="nieuweTijd" placeholder="bv. 10:00">
    </div>

    <div class="modal-actions">
      <button class="btn-approve" onclick="opslaanDatum()">Opslaan</button>
      <button class="btn-close" onclick="closeDatumModal()">Annuleren</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
/* -------------------------
   SUPABASE INIT
------------------------- */
const client = supabase.createClient(
  "https://elmkjlqcsshctmnbqbfq.supabase.co",
  "sb_publishable_yROKuvppBKGe-bdXd_6hzQ_w2V2v77i"
);

let currentUser = null;

/* -------------------------
   ONLOAD
------------------------- */
window.onload = async () => {
  const { data: { user } } = await client.auth.getUser();
  if (!user) { window.location.href = "login.html"; return; }

  const { data: profile } = await client
    .from("profiles")
    .select("*")
    .eq("user_id", user.id)
    .single();

  if (!profile || !profile.is_admin) {
    alert("Geen toegang tot adminpaneel.");
    window.location.href = "dashboard.html";
    return;
  }

  currentUser = profile;
  document.getElementById("adminInfo").innerText =
    `Ingelogd als admin: ${profile.email}`;

  loadUsers();
  loadAanvragen();
  loadBeschikbaarheid();
  loadLogs();

  /* Realtime */
  client.channel("realtime-aanvragen")
    .on("postgres_changes", { event:"*", schema:"public", table:"aanvragen" }, loadAanvragen)
    .subscribe();

  client.channel("realtime-beschikbaarheid")
    .on("postgres_changes", { event:"*", schema:"public", table:"beschikbaarheid" }, loadBeschikbaarheid)
    .subscribe();

  client.channel("realtime-datums")
    .on("postgres_changes", { event:"*", schema:"public", table:"beschikbare_datums" }, () => {
      console.log("Nieuwe datum toegevoegd");
    })
    .subscribe();
};

/* -------------------------
   GEBRUIKERS
------------------------- */
async function loadUsers() {
  const { data: users } = await client.from("profiles").select("*").order("email");
  const table = document.getElementById("userTable");
  table.innerHTML = "";

  users.forEach(u => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${u.email}</td>
      <td>${u.name || "-"}</td>
      <td>${u.approved ? "✔️" : "❌"}</td>
      <td>${u.is_admin ? "✔️" : "❌"}</td>
      <td>
        <button class="btn-approve" onclick="approveUser('${u.user_id}')">Goedkeuren</button>
        <button class="btn-block" onclick="blockUser('${u.user_id}')">Blokkeren</button>
        <button class="btn-admin" onclick="toggleAdmin('${u.user_id}', ${u.is_admin})">Admin</button>
        <button class="btn-reset" onclick="resetPassword('${u.email}')">Reset wachtwoord</button>
        <button class="btn-delete" onclick="deleteUser('${u.user_id}')">Verwijderen</button>
      </td>
    `;

    table.appendChild(row);
  });
}

async function approveUser(id) {
  await client.from("profiles").update({ approved: true }).eq("user_id", id);
  loadUsers();
}

async function blockUser(id) {
  await client.from("profiles").update({ approved: false }).eq("user_id", id);
  loadUsers();
}

async function toggleAdmin(id, isAdmin) {
  await client.from("profiles").update({ is_admin: !isAdmin }).eq("user_id", id);
  loadUsers();
}

async function resetPassword(email) {
  await client.auth.resetPasswordForEmail(email);
  alert("Resetmail verzonden!");
}

async function deleteUser(id) {
  await client.from("profiles").delete().eq("user_id", id);
  loadUsers();
}

/* -------------------------
   AANVRAGEN
------------------------- */
async function loadAanvragen() {
  const { data } = await client.from("aanvragen").select("*");
  const table = document.getElementById("aanvraagTable");
  table.innerHTML = "";

  const posten = [
    "Post Balen", "Post Geel", "Post Grobbendonk",
    "Post Herentals", "Post Herenthout", "Post Mol", "Post Westerlo"
  ];

  data.forEach(a => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${a.school}</td>
      <td>${a.datum}</td>
      <td>${posten[(a.post_nummer || 1) - 1]}</td>
      <td>${a.status}</td>
      <td>
        <button class="btn-approve" onclick="setStatus(${a.id}, 'Goedgekeurd')">Goedkeuren</button>
        <button class="btn-block" onclick="setStatus(${a.id}, 'Afgekeurd')">Afkeuren</button>
      </td>
    `;

    table.appendChild(row);
  });
}

async function setStatus(id, status) {
  await client.from("aanvragen").update({ status }).eq("id", id);
  loadAanvragen();
}

/* -------------------------
   BESCHIKBAARHEID
------------------------- */
async function loadBeschikbaarheid() {
  const { data } = await client.from("beschikbaarheid").select("*");
  const table = document.getElementById("beschikbaarheidTable");
  table.innerHTML = "";

  data.forEach(b => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${b.user_email}</td>
      <td>${b.datum}</td>
      <td>${b.aanwezig ? "✔️" : "❌"}</td>
    `;

    table.appendChild(row);
  });
}

/* -------------------------
   LOGGING
------------------------- */
async function loadLogs() {
  const { data } = await client.from("logs").select("*").order("id", { ascending:false });
  const table = document.getElementById("logTable");
  table.innerHTML = "";

  data.forEach(l => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${l.created_at}</td>
      <td>${l.user}</td>
      <td>${l.actie}</td>
    `;

    table.appendChild(row);
  });
}

/* -------------------------
   DATUM TOEVOEGEN
------------------------- */
function openDatumModal() {
  document.getElementById("datumModal").style.display = "block";
}

function closeDatumModal() {
  document.getElementById("datumModal").style.display = "none";
}

async function opslaanDatum() {
  const datum = document.getElementById("nieuweDatum").value.trim();
  const tijd = document.getElementById("nieuweTijd").value.trim();

  if (!datum || !tijd) {
    alert("Vul zowel datum als tijd in.");
    return;
  }

  const { error } = await client
    .from("beschikbare_datums")
    .insert([{ datum, tijd }]);

  if (error) {
    alert("Fout bij opslaan: " + error.message);
    return;
  }

  alert("Datum toegevoegd!");
  closeDatumModal();
}

/* -------------------------
   LOGOUT
------------------------- */
async function logout() {
  await client.auth.signOut();
  window.location.href = "login.html";
}
</script>

</body>
</html>
