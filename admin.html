<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adminpaneel – Beheer</title>

<style>
body {
  font-family:'Segoe UI';
  background: linear-gradient(160deg,#ff6a00,#ffb347);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding-top:40px;
  min-height:100vh;
  margin:0;
}

.container {
  background: rgba(255,255,255,0.15);
  backdrop-filter:blur(10px);
  padding:30px;
  border-radius:25px;
  width:1100px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2 { color:white; margin-bottom:20px; }
h3 { color:white; margin-top:40px; }

table {
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
  background:white;
  border-radius:15px;
  overflow:hidden;
}

th, td {
  padding:12px;
  border-bottom:1px solid #ddd;
  font-size:15px;
}

th {
  background:#ff6a00;
  color:white;
}

button {
  padding:8px 12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:14px;
}

.btn-approve { background:green; color:white; }
.btn-block { background:red; color:white; }
.btn-admin { background:#444; color:white; }
.btn-delete { background:#b30000; color:white; }
.btn-reset { background:#0066cc; color:white; }

.logout-btn {
  margin-top:20px;
  background:white;
  color:#ff6a00;
  font-weight:bold;
  padding:12px 20px;
  border-radius:20px;
}
</style>
</head>

<body>

<div class="container">
  <h2>👨‍🚒 Adminpaneel – Volledig beheer</h2>

  <p id="adminInfo" style="color:white;font-size:18px;"></p>

  <!-- GEBRUIKERS -->
  <h3>👥 Gebruikersbeheer</h3>
  <table>
    <thead>
      <tr>
        <th>Email</th>
        <th>Naam</th>
        <th>Goedgekeurd</th>
        <th>Admin</th>
        <th>Acties</th>
      </tr>
    </thead>
    <tbody id="userTable"></tbody>
  </table>

  <!-- AANVRAGEN -->
  <h3>🏫 Bezoekaanvragen beheren</h3>
  <table>
    <thead>
      <tr>
        <th>School</th>
        <th>Datum</th>
        <th>Status</th>
        <th>Acties</th>
      </tr>
    </thead>
    <tbody id="aanvraagTable"></tbody>
  </table>

  <!-- BESCHIKBAARHEID -->
  <h3>📅 Beschikbaarheid van gebruikers</h3>
  <table>
    <thead>
      <tr>
        <th>Email</th>
        <th>Datum</th>
        <th>Aanwezig</th>
      </tr>
    </thead>
    <tbody id="beschikbaarheidTable"></tbody>
  </table>

  <!-- LOGS -->
  <h3>📜 Logs</h3>
  <table>
    <thead>
      <tr>
        <th>Tijd</th>
        <th>Gebruiker</th>
        <th>Actie</th>
      </tr>
    </thead>
    <tbody id="logTable"></tbody>
  </table>

  <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = supabase.createClient(
  "https://elmkjlqcsshctmnbqbfq.supabase.co",
  "sb_publishable_yROKuvppBKGe-bdXd_6hzQ_w2V2v77i"
);

let currentUser = null;

window.onload = async () => {
  const { data: { user } } = await client.auth.getUser();
  if (!user) { window.location.href = "login.html"; return; }

  const { data: profile } = await client
    .from("profiles")
    .select("*")
    .eq("user_id", user.id)
    .single();

  if (!profile || !profile.is_admin) {
    alert("Geen toegang tot adminpaneel.");
    window.location.href = "dashboard.html";
    return;
  }

  currentUser = profile;
  document.getElementById("adminInfo").innerText =
    `Ingelogd als admin: ${profile.email}`;

  loadUsers();
  loadAanvragen();
  loadBeschikbaarheid();
  loadLogs();
};

/* -------------------------
   GEBRUIKERS
------------------------- */
async function loadUsers() {
  const { data: users } = await client.from("profiles").select("*").order("email");
  const table = document.getElementById("userTable");
  table.innerHTML = "";

  users.forEach(u => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${u.email}</td>
      <td>${u.name || "-"}</td>
      <td>${u.approved ? "✔️" : "❌"}</td>
      <td>${u.is_admin ? "✔️" : "❌"}</td>
      <td>
        <button class="btn-approve" onclick="approveUser('${u.user_id}')">Goedkeuren</button>
        <button class="btn-block" onclick="blockUser('${u.user_id}')">Blokkeren</button>
        <button class="btn-admin" onclick="toggleAdmin('${u.user_id}', ${u.is_admin})">Admin</button>
        <button class="btn-reset" onclick="resetPassword('${u.email}')">Reset wachtwoord</button>
        <button class="btn-delete" onclick="deleteUser('${u.user_id}')">Verwijderen</button>
      </td>
    `;

    table.appendChild(row);
  });
}

async function approveUser(id) {
  await client.from("profiles").update({ approved: true }).eq("user_id", id);
  log("Gebruiker goedgekeurd");
  loadUsers();
}

async function blockUser(id) {
  await client.from("profiles").update({ approved: false }).eq("user_id", id);
  log("Gebruiker geblokkeerd");
  loadUsers();
}

async function toggleAdmin(id, isAdmin) {
  await client.from("profiles").update({ is_admin: !isAdmin }).eq("user_id", id);
  log("Adminrechten aangepast");
  loadUsers();
}

async function resetPassword(email) {
  await client.auth.resetPasswordForEmail(email);
  alert("Resetmail verzonden!");
  log("Wachtwoord reset aangevraagd");
}

async function deleteUser(id) {
  await client.from("profiles").delete().eq("user_id", id);
  log("Gebruiker verwijderd");
  loadUsers();
}

/* -------------------------
   AANVRAGEN
------------------------- */
async function loadAanvragen() {
  const { data } = await client.from("aanvragen").select("*");
  const table = document.getElementById("aanvraagTable");
  table.innerHTML = "";

  data.forEach(a => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${a.school}</td>
      <td>${a.datum}</td>
      <td>${a.status}</td>
      <td>
        <button class="btn-approve" onclick="setStatus(${a.id}, 'Goedgekeurd')">Goedkeuren</button>
        <button class="btn-block" onclick="setStatus(${a.id}, 'Afgekeurd')">Afkeuren</button>
      </td>
    `;

    table.appendChild(row);
  });
}

async function setStatus(id, status) {
  await client.from("aanvragen").update({ status }).eq("id", id);
  log("Aanvraagstatus aangepast");
  loadAanvragen();
}

/* -------------------------
   BESCHIKBAARHEID
------------------------- */
async function loadBeschikbaarheid() {
  const { data } = await client.from("beschikbaarheid").select("*");
  const table = document.getElementById("beschikbaarheidTable");
  table.innerHTML = "";

  data.forEach(b => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${b.user_email}</td>
      <td>${b.datum}</td>
      <td>${b.aanwezig ? "✔️" : "❌"}</td>
    `;

    table.appendChild(row);
  });
}

/* -------------------------
   LOGGING
------------------------- */
async function log(action) {
  await client.from("logs").insert([
    { user: currentUser.email, actie: action }
  ]);
}

async function loadLogs() {
  const { data } = await client.from("logs").select("*").order("id", { ascending: false });
  const table = document.getElementById("logTable");
  table.innerHTML = "";

  data.forEach(l => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${l.created_at}</td>
      <td>${l.user}</td>
      <td>${l.actie}</td>
    `;

    table.appendChild(row);
  });
}

/* -------------------------
   LOGOUT
------------------------- */
async function logout() {
  await client.auth.signOut();
  window.location.href = "login.html";
}
</script>

</body>
</html>
