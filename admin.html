<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Goedkeuren Gebruikers</title>
<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f4f4f4;
  margin: 0;
  padding: 0;
}
header {
  background: #c71f1f;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 22px;
}
.container {
  max-width: 800px;
  margin: 20px auto;
  background: white;
  border-radius: 10px;
  padding: 20px;
}
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
}
th, td {
  border: 1px solid #ddd;
  padding: 12px;
  text-align: left;
}
th {
  background: #c71f1f;
  color: white;
}
button {
  padding: 8px 12px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}
.btn-approve { background: green; color: white; }
.btn-reject { background: red; color: white; }
.logout-btn { margin-top: 15px; background: #ff6a00; color: white; padding: 10px 15px; }
.logout-btn:hover { transform: scale(1.03); }
</style>
</head>
<body>

<header>🛠 Admin - Gebruikers Goedkeuren</header>

<div class="container">
  <div id="welcome"></div>
  <table>
    <thead>
      <tr>
        <th>Naam</th>
        <th>Email</th>
        <th>Goedgekeurd</th>
        <th>Acties</th>
      </tr>
    </thead>
    <tbody id="userTable"></tbody>
  </table>

  <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const supabaseUrl = "https://elmkjlqcsshctmnbqbfq.supabase.co";
const supabaseKey = "sb_publishable_yROKuvppBKGe-bdXd_6hzQ_w2V2v77i";
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// Check login
(async () => {
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) window.location.href = "login.html";

  // Check of admin (kan via email of een extra veld in profiel)
  const { data: profile } = await supabase
    .from("profiles")
    .select("*")
    .eq("user_id", user.id)
    .single();

  if (!profile.is_admin) {
    alert("Geen toegang tot adminpagina!");
    window.location.href = "dashboard.html";
    return;
  }

  document.getElementById("welcome").innerText = `Welkom, ${profile.name || profile.email}!`;
  laadGebruikers();
})();

// Laad alle gebruikers
async function laadGebruikers() {
  const { data: users, error } = await supabase.from("profiles").select("*");

  if (error) { console.error(error); return; }

  const tbody = document.getElementById("userTable");
  tbody.innerHTML = "";

  users.forEach(u => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${u.name}</td>
      <td>${u.email}</td>
      <td>${u.approved ? "✅" : "❌"}</td>
      <td>
        ${!u.approved ? `<button class="btn-approve" onclick="goedkeuren('${u.user_id}')">Goedkeuren</button>` : ""}
        ${u.approved ? `<button class="btn-reject" onclick="weigeren('${u.user_id}')">Weigeren</button>` : ""}
      </td>
    `;
    tbody.appendChild(tr);
  });
}

// Goedkeuren
async function goedkeuren(user_id) {
  await supabase.from("profiles").update({ approved: true }).eq("user_id", user_id);
  laadGebruikers();
}

// Weigeren
async function weigeren(user_id) {
  await supabase.from("profiles").update({ approved: false }).eq("user_id", user_id);
  laadGebruikers();
}

// Logout
async function logout() {
  await supabase.auth.signOut();
  window.location.href = "login.html";
}
</script>

</body>
</html>
