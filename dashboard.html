<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard – Bezoeken</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css" rel="stylesheet">

<style>
body {
  font-family:'Segoe UI', sans-serif;
  margin:0;
  background: linear-gradient(160deg,#ff6a00,#ffb347);
}
header {
  background:#c71f1f;
  color:white;
  padding:15px;
  text-align:center;
  font-size:22px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}
header span.icon { font-size:26px; }
.main {
  max-width:1200px;
  margin:20px auto;
  padding:20px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(10px);
  border-radius:25px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
#welcome { font-size:18px; margin-bottom:10px; color:white; }
#legend { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px; }
.legend-item {
  display:flex;
  align-items:center;
  gap:6px;
  padding:4px 8px;
  border-radius:12px;
  background:rgba(255,255,255,0.2);
  color:white;
  font-size:13px;
}
.legend-color { width:14px; height:14px; border-radius:50%; }
#calendar {
  margin-top:10px;
  background:white;
  border-radius:15px;
  padding:10px;
}
.section { margin-top:25px; }
.section h3 {
  color:white;
  display:flex;
  align-items:center;
  gap:8px;
}
.section h3 span.icon { font-size:20px; }
#beschikbaarheidContainer .slot {
  margin:5px 0;
  background:rgba(255,255,255,0.9);
  padding:8px 10px;
  border-radius:10px;
  display:flex;
  align-items:center;
  gap:8px;
  font-size:14px;
}
button {
  padding:10px 14px;
  border:none;
  border-radius:18px;
  cursor:pointer;
  margin-top:10px;
  font-size:14px;
  transition: transform 0.2s;
}
.primary-btn {
  background:white;
  color:#ff6a00;
  font-weight:bold;
}
.logout-btn {
  background:#ff6a00;
  color:white;
  margin-left:10px;
}
.logout-btn:hover,
.primary-btn:hover {
  transform:scale(1.03);
}
.modal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:100;
}
.modal-content {
  background:white;
  padding:20px;
  max-width:500px;
  margin:80px auto;
  border-radius:15px;
}
.modal-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.modal-header h3 { margin:0; }
.modal-body p { margin:4px 0; font-size:14px; }
.modal-actions {
  margin-top:15px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.btn-approve { background:green; color:white; }
.btn-reject { background:#999; color:white; }
.btn-swap { background:#f58231; color:white; }
.btn-close { background:#555; color:white; }

@media (max-width: 600px) {
  .main { width:90%; padding:15px; }
  #calendar { padding:5px; }
  .modal-content { margin:40px 10px; width:auto; }
}
</style>
</head>
<body>

<header>
  <span class="icon">🔥</span>
  <span>Dashboard Bezoekaanvragen</span>
</header>

<div class="main">
  <div id="welcome"></div>

  <button id="adminBtn" class="primary-btn" style="display:none;" onclick="openAdmin()">
    🛠️ Adminpaneel
  </button>

  <div id="legend"></div>
  <div id="calendar"></div>

  <div class="section">
    <h3><span class="icon">📅</span>Geef je beschikbaarheid door</h3>
    <div id="beschikbaarheidContainer"></div>
    <button class="primary-btn" onclick="opslaanBeschikbaarheid()">Beschikbaarheid opslaan</button>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Details bezoek</h3>
      <button class="btn-close" onclick="closeModal()">X</button>
    </div>
    <div class="modal-body">
      <p id="details"></p>
      <p id="bezetting"></p>
    </div>
    <div class="modal-actions">
      <button class="btn-approve" onclick="setBeschikbaarheid(true)">Ik ben beschikbaar</button>
      <button class="btn-reject" onclick="setBeschikbaarheid(false)">Ik kan niet</button>
      <button class="btn-swap" onclick="vraagRuil()">Dienst ruilen</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/locales-all.global.min.js"></script>

<script>
const supabaseUrl = "https://elmkjlqcsshctmnbqbfq.supabase.co";
const supabaseKey = "sb_publishable_yROKuvppBKGe-bdXd_6hzQ_w2V2v77i";
const client = window.supabase.createClient(supabaseUrl, supabaseKey);

let currentUser = null;
let selectedEvent = null;
let checkboxes = [];

const posten = [
  { naam: "Post Balen", kleur: "#e6194b", icoon: "🚒" },
  { naam: "Post Geel", kleur: "#3cb44b", icoon: "🧯" },
  { naam: "Post Grobbendonk", kleur: "#ffe119", icoon: "🔥" },
  { naam: "Post Herentals", kleur: "#4363d8", icoon: "🚨" },
  { naam: "Post Herenthout", kleur: "#f58231", icoon: "🏫" },
  { naam: "Post Mol", kleur: "#911eb4", icoon: "📟" },
  { naam: "Post Westerlo", kleur: "#46f0f0", icoon: "📞" }
];

const datums = ["10 april 2026","15 april 2026","22 april 2026","5 mei 2026"];
const tijden = ["10:00","13:30"];

const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
  initialView: 'dayGridMonth',
  locale: 'nl',
  height: 'auto',
  eventDisplay: 'block',
  eventClick: onEventClick
});

document.addEventListener('DOMContentLoaded', async () => {
  try {
    const { data: { user }, error: userError } = await client.auth.getUser();

    if (userError || !user) {
      window.location.href = "login.html";
      return;
    }

    const { data: profile, error: profileError } = await client
      .from("profiles")
      .select("*")
      .eq("user_id", user.id)
      .maybeSingle();

    if (profileError) {
      console.error("Fout bij profiel:", profileError);
      alert("Fout bij laden van profiel.");
      return;
    }

    if (!profile) {
      alert("Geen profiel gevonden.");
      await client.auth.signOut();
      window.location.href = "login.html";
      return;
    }

    if (!profile.approved) {
      alert("Account niet goedgekeurd.");
      await client.auth.signOut();
      window.location.href = "login.html";
      return;
    }

    currentUser = profile;
    document.getElementById("welcome").innerText = `Welkom, ${profile.name || profile.email}!`;

    if (profile.is_admin === true) {
      document.getElementById("adminBtn").style.display = "inline-block";
    }

    bouwLegend();
    laadBeschikbaarheidSlots();
    await laadBestaandeBeschikbaarheid();
    calendar.render();
    await loadEvents();

  } catch (err) {
    console.error("Onverwachte fout:", err);
    alert("Er liep iets mis bij het laden.");
  }
});

function bouwLegend() {
  const legend = document.getElementById("legend");
  legend.innerHTML = "";

  posten.forEach(p => {
    const div = document.createElement("div");
    div.className = "legend-item";

    const color = document.createElement("div");
    color.className = "legend-color";
    color.style.background = p.kleur;

    div.appendChild(color);
    div.appendChild(document.createTextNode(`${p.icoon} ${p.naam}`));
    legend.appendChild(div);
  });
}

async function loadEvents() {
  const { data, error } = await client
    .from("aanvragen")
    .select("*")
    .eq("status", "goedgekeurd");

  if (error) {
    console.error("Fout bij laden aanvragen:", error);
    return;
  }

  console.log("Geladen aanvragen:", data);

  calendar.removeAllEvents();

  if (!data || data.length === 0) {
    console.log("Geen goedgekeurde aanvragen gevonden.");
    return;
  }

  data.forEach(item => {
    try {
      if (!item.datum) {
        console.log("Geen datum bij item:", item);
        return;
      }

      let datumDeel = "";
      let tijdDeel = "09:00";

      if (item.datum.includes(" - ")) {
        const parts = item.datum.split(" - ");
        datumDeel = parts[0]?.trim() || "";
        tijdDeel = parts[1]?.trim() || "09:00";
      } else {
        datumDeel = item.datum.trim();
      }

      const isoDate = convertToISO(datumDeel);
      if (!isoDate) {
        console.log("Datum kon niet omgezet worden:", item.datum);
        return;
      }

      const iso = `${isoDate}T${tijdDeel}`;
      const postIndex = ((item.post_nummer || 1) - 1);
      const post = posten[postIndex] || posten[0];

      console.log("Event toegevoegd:", {
        title: item.school,
        start: iso,
        status: item.status
      });

      calendar.addEvent({
        title: `${post.icoon} ${item.school || "Bezoek"}`,
        start: iso,
        color: post.kleur,
        extendedProps: {
          ...item,
          postNaam: post.naam,
          postIcoon: post.icoon
        }
      });

    } catch (e) {
      console.error("Fout bij event:", item, e);
    }
  });
}

function convertToISO(d) {
  const maanden = {
    januari: "01",
    februari: "02",
    maart: "03",
    april: "04",
    mei: "05",
    juni: "06",
    juli: "07",
    augustus: "08",
    september: "09",
    oktober: "10",
    november: "11",
    december: "12"
  };

  const parts = d.trim().split(/\s+/);
  if (parts.length !== 3) return "";

  const dag = parts[0].padStart(2, '0');
  const maand = maanden[parts[1].toLowerCase()];
  const jaar = parts[2];

  if (!maand || !jaar) return "";

  return `${jaar}-${maand}-${dag}`;
}

async function onEventClick(info) {
  selectedEvent = info.event.extendedProps;

  document.getElementById("details").innerHTML = `
    <b>${selectedEvent.postIcoon} ${selectedEvent.postNaam}</b><br>
    <b>School:</b> ${selectedEvent.school || "-"}<br>
    <b>Datum:</b> ${selectedEvent.datum || "-"}<br>
    <b>Begeleider:</b> ${selectedEvent.begeleider || "-"}<br>
    <b>Email:</b> ${selectedEvent.email || "-"}<br>
    <b>GSM:</b> ${selectedEvent.gsm || "-"}<br>
    <b>Status:</b> ${selectedEvent.status || "-"}
  `;

  await updateBezetting(selectedEvent);
  document.getElementById("modal").style.display = "block";
}

async function updateBezetting(ev) {
  const { data, error } = await client
    .from("beschikbaarheid")
    .select("*")
    .eq("datum", ev.datum);

  if (error) {
    console.error(error);
    document.getElementById("bezetting").innerHTML = "Fout bij laden bezetting.";
    return;
  }

  const nodig = 2;
  const aanwezig = data ? data.filter(b => b.aanwezig) : [];
  const tekort = Math.max(0, nodig - aanwezig.length);

  const lijst = aanwezig.length
    ? aanwezig.map(b => `${b.user_email}`).join("<br>")
    : "Nog niemand";

  document.getElementById("bezetting").innerHTML = `
    <b>Ingeschreven begeleiders (${aanwezig.length}/${nodig}):</b><br>
    ${lijst}<br>
    ${tekort > 0
      ? `<span style="color:#c71f1f;">Nog ${tekort} nodig</span>`
      : `<span style="color:green;">Volledig bemand</span>`}
  `;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
  selectedEvent = null;
}

async function setBeschikbaarheid(aanwezig) {
  if (!selectedEvent || !currentUser) return;

  await client
    .from("beschikbaarheid")
    .delete()
    .eq("user_email", currentUser.email)
    .eq("datum", selectedEvent.datum);

  await client
    .from("beschikbaarheid")
    .insert([{
      user_email: currentUser.email,
      datum: selectedEvent.datum,
      aanwezig: aanwezig,
      ruil_gevraagd: false
    }]);

  alert(aanwezig ? "Je hebt je beschikbaar gesteld." : "Je bent niet beschikbaar.");
  await updateBezetting(selectedEvent);
}

async function vraagRuil() {
  if (!selectedEvent || !currentUser) return;

  const { error } = await client
    .from("beschikbaarheid")
    .update({ ruil_gevraagd: true })
    .eq("user_email", currentUser.email)
    .eq("datum", selectedEvent.datum);

  if (error) {
    alert("Ruil aanvragen mislukt.");
    return;
  }

  alert("Je hebt een ruil aangevraagd.");
}

function laadBeschikbaarheidSlots() {
  const container = document.getElementById("beschikbaarheidContainer");
  container.innerHTML = "";
  checkboxes = [];

  datums.forEach(d => {
    tijden.forEach(t => {
      const key = d + " - " + t;

      const div = document.createElement("div");
      div.className = "slot";

      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.value = key;

      const label = document.createElement("span");
      label.textContent = `📅 ${key}`;

      checkboxes.push(cb);
      div.appendChild(cb);
      div.appendChild(label);
      container.appendChild(div);
    });
  });
}

async function laadBestaandeBeschikbaarheid() {
  if (!currentUser) return;

  const { data } = await client
    .from("beschikbaarheid")
    .select("*")
    .eq("user_email", currentUser.email);

  checkboxes.forEach(cb => {
    if (data && data.some(d => d.datum === cb.value && d.aanwezig)) {
      cb.checked = true;
    }
  });
}

async function opslaanBeschikbaarheid() {
  if (!currentUser) return;

  await client
    .from("beschikbaarheid")
    .delete()
    .eq("user_email", currentUser.email);

  const inserts = checkboxes
    .filter(cb => cb.checked)
    .map(cb => ({
      user_email: currentUser.email,
      datum: cb.value,
      aanwezig: true,
      ruil_gevraagd: false
    }));

  if (inserts.length > 0) {
    await client.from("beschikbaarheid").insert(inserts);
  }

  alert("Beschikbaarheid opgeslagen.");
}

function openAdmin() {
  window.location.href = "admin.html";
}

async function logout() {
  await client.auth.signOut();
  window.location.href = "login.html";
}
</script>

</body>
</html>
