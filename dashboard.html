<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Bezoeken</title>
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css" rel="stylesheet">
<style>
body { font-family:'Segoe UI', sans-serif; margin:0; background:#f4f4f4; }
header { background:#c71f1f; color:white; padding:15px; text-align:center; font-size:22px; }
.container { max-width:1100px; margin:20px auto; padding:20px; background:white; border-radius:15px; }
#welcome { font-size:18px; margin-bottom:15px; }
#calendar { margin-top:20px; }
.logout-btn { margin-top:15px; background:#ff6a00; color:white; border-radius:15px; padding:10px 15px; border:none; cursor:pointer; }
.logout-btn:hover { transform:scale(1.03); }
</style>
</head>
<body>

<header>🔥 Dashboard Bezoekaanvragen</header>
<div class="container">
  <div id="welcome"></div>
  <div id="calendar"></div>
  <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.js"></script>
<script>
  // 🔐 Supabase
  const supabaseUrl = "https://elmkjlqcsshctmnbqbfq.supabase.co";
  const supabaseKey = "sb_publishable_yROKuvppBKGe-bdXd_6hzQ_w2V2v77i";
  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

  let userProfile = null;

  window.onload = async () => {
    // 🔐 User check
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) { window.location.href="login.html"; return; }

    const { data: profile, error } = await supabase.from("profiles").select("*").eq("user_id", user.id).single();
    if(error || !profile.approved){ 
      alert("Je account is niet goedgekeurd!"); 
      await supabase.auth.signOut(); 
      window.location.href="login.html"; 
      return; 
    }

    userProfile = profile;
    document.getElementById("welcome").innerText = `Welkom, ${profile.name || profile.email}!`;

    loadEvents();
  };

  function convertToISO(datum){
    const maanden = { januari:"01", februari:"02", maart:"03", april:"04", mei:"05", juni:"06", juli:"07", augustus:"08", september:"09", oktober:"10", november:"11", december:"12"};
    const parts = datum.split(" "); const dag = parts[0]; const maand = maanden[parts[1]]; const jaar = parts[2];
    return `${jaar}-${maand}-${dag.padStart(2,'0')}`;
  }

  // 🔥 Kalender
  const calendar = new FullCalendar.Calendar(document.getElementById('calendar'),{
    initialView:'dayGridMonth',
    locale:'nl'
  });
  calendar.render();

  // 🔥 Events laden
  async function loadEvents(){
    const { data, error } = await supabase.from("aanvragen").select("*");
    if(error){ console.error(error); return; }

    data.forEach(item=>{
      const date = convertToISO(item.datum.split(" - ")[0]) + "T" + item.datum.split(" - ")[1];
      calendar.addEvent({
        title: item.school,
        start: date,
        color: item.status === "goedgekeurd" ? "green" : item.status === "geweigerd" ? "red" : "orange",
        extendedProps: item
      });
    });
  }

  async function logout(){
    await supabase.auth.signOut();
    window.location.href="login.html";
  }
</script>

</body>
</html>
