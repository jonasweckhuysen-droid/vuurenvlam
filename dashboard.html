<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Bezoeken</title>
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css" rel="stylesheet">
<style>
body { font-family:'Segoe UI', sans-serif; margin:0; background:#f4f4f4; }
header { background:#c71f1f; color:white; padding:15px; text-align:center; font-size:22px; }
.container { max-width:1100px; margin:20px auto; padding:20px; background:white; border-radius:15px; }
#welcome { font-size:18px; margin-bottom:15px; }
#calendar { margin-top:20px; }
#beschikbaarheidContainer { margin-top:20px; }
.slot { margin:5px 0; }
button { padding:10px 15px; border:none; border-radius:8px; cursor:pointer; }
.btn-approve { background:green; color:white; margin-right:5px; }
.btn-reject { background:red; color:white; margin-right:5px; }
.btn-close { background:gray; color:white; }
.logout-btn { margin-top:15px; background:#ff6a00; color:white; border-radius:15px; }
.logout-btn:hover { transform:scale(1.03); }
.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:100; }
.modal-content { background:white; padding:20px; max-width:500px; margin:100px auto; border-radius:10px; }
input[type=checkbox] { margin-right:5px; }
</style>
</head>
<body>

<header>🔥 Dashboard Bezoekaanvragen</header>
<div class="container">
  <div id="welcome"></div>

  <div id="calendar"></div>

  <h3>👨‍🚒 Geef je beschikbaarheid door</h3>
  <div id="beschikbaarheidContainer"></div>
  <button onclick="opslaanBeschikbaarheid()">Opslaan Beschikbaarheid</button>
  <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3>Details aanvraag</h3>
    <p id="details"></p>
    <label>
      <input type="checkbox" id="stelBeschikbaar"> Ik ben beschikbaar
    </label>
    <br>
    <label>
      <input type="checkbox" id="zoekVervanger"> Ik zoek een vervanger
    </label>
    <br>
    <button class="btn-close" onclick="closeModal()">Sluiten</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.js"></script>
<script>
  // 🔐 Supabase (Één keer)
  const supabaseUrl = "https://elmkjlqcsshctmnbqbfq.supabase.co";
  const supabaseKey = "sb_publishable_yROKuvppBKGe-bdXd_6hzQ_w2V2v77i";
  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

  let selectedEvent = null;
  let userProfile = null;
  let checkboxes = [];
  const datums = ["10 april 2026","15 april 2026","22 april 2026","5 mei 2026"];
  const tijden = ["10:00","13:30"];
  const posten = ["Post 1","Post 2","Post 3","Post 4","Post 5","Post 6","Post 7"];
  const postColors = ["#c71f1f","#ff6a00","#ffb347","#4caf50","#2196f3","#9c27b0","#ff4081"];

  window.onload = async () => {
    // 🔐 User check
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) { window.location.href="login.html"; return; }

    const { data: profile, error } = await supabase.from("profiles").select("*").eq("user_id", user.id).single();
    if(error || !profile.approved){ alert("Je account is niet goedgekeurd!"); await supabase.auth.signOut(); window.location.href="login.html"; return; }
    userProfile = profile;
    document.getElementById("welcome").innerText = `Welkom, ${profile.name || profile.email}!`;

    laadBeschikbaarheidSlots();
    loadEvents();
  };

  function convertToISO(datum){
    const maanden = { januari:"01", februari:"02", maart:"03", april:"04", mei:"05", juni:"06", juli:"07", augustus:"08", september:"09", oktober:"10", november:"11", december:"12"};
    const parts = datum.split(" "); const dag = parts[0]; const maand = maanden[parts[1]]; const jaar = parts[2];
    return `${jaar}-${maand}-${dag.padStart(2,'0')}`;
  }

  // 🔥 Kalender
  const calendar = new FullCalendar.Calendar(document.getElementById('calendar'),{
    initialView:'dayGridMonth',
    locale:'nl',
    eventClick: async (info) => {
      selectedEvent = info.event.extendedProps;
      document.getElementById("details").innerHTML = `
        <b>School:</b> ${selectedEvent.school}<br>
        <b>Begeleider:</b> ${selectedEvent.begeleider}<br>
        <b>Email:</b> ${selectedEvent.email}<br>
        <b>GSM:</b> ${selectedEvent.gsm}<br>
        <b>Status:</b> ${selectedEvent.status}
      `;

      const { data: beschikbaar } = await supabase.from("beschikbaarheid").select("*").eq("datum", selectedEvent.datum);
      document.getElementById("stelBeschikbaar").checked = beschikbaar.some(b => b.user_email===userProfile.email && !b.vervanger);
      document.getElementById("zoekVervanger").checked = beschikbaar.some(b => b.user_email===userProfile.email && b.vervanger);

      document.getElementById("modal").style.display="block";
    }
  });
  calendar.render();

  // 🔥 Events laden
  async function loadEvents(){
    const { data, error } = await supabase.from("aanvragen").select("*");
    if(error){ console.error(error); return; }
    data.forEach(item=>{
      const date = convertToISO(item.datum.split(" - ")[0]) + "T" + item.datum.split(" - ")[1];
      const postIndex = posten.indexOf(item.post) % posten.length;
      calendar.addEvent({
        title:item.school,
        start:date,
        color:postColors[postIndex],
        extendedProps:item
      });
    });
  }

  function closeModal(){ document.getElementById("modal").style.display="none"; }

  // 🔥 Beschikbaarheid slots
  function laadBeschikbaarheidSlots(){
    const container = document.getElementById("beschikbaarheidContainer");
    container.innerHTML = "";
    checkboxes = [];

    datums.forEach(datum=>{
      tijden.forEach(tijd=>{
        const key = datum + " - " + tijd;
        const div = document.createElement("div");
        div.className="slot";
        const checkbox = document.createElement("input");
        checkbox.type="checkbox"; checkbox.value=key; checkboxes.push(checkbox);
        div.appendChild(checkbox); div.append(" " + key);
        container.appendChild(div);
      });
    });

    (async ()=>{
      const { data: bestaande } = await supabase.from("beschikbaarheid").select("datum").eq("user_email", userProfile.email);
      if(bestaande) bestaande.forEach(b=>{
        checkboxes.forEach(cb=>{ if(cb.value===b.datum) cb.checked=true; });
      });
    })();
  }

  async function opslaanBeschikbaarheid(){
    await supabase.from("beschikbaarheid").delete().eq("user_email", userProfile.email);
    const inserts = checkboxes.filter(cb=>cb.checked).map(cb=>({user_email:userProfile.email, datum:cb.value}));
    if(inserts.length>0) await supabase.from("beschikbaarheid").insert(inserts);
    alert("✅ Beschikbaarheid opgeslagen!");
  }

  async function logout(){
    await supabase.auth.signOut();
    window.location.href="login.html";
  }

</script>
</body>
</html>
