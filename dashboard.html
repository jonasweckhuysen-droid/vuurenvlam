<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Bezoeken</title>

<!-- FullCalendar CSS -->
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css" rel="stylesheet">

<style>
body { font-family:'Segoe UI', sans-serif; margin:0; background:#f4f4f4; }
header { background:#c71f1f; color:white; padding:15px; text-align:center; font-size:20px; }
.container { max-width:1100px; margin:20px auto; padding:20px; background:white; border-radius:10px; }
#welcome { font-size:18px; margin-bottom:15px; }
#calendar { margin-top:20px; }
.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:100; }
.modal-content { background:white; padding:20px; max-width:500px; margin:100px auto; border-radius:10px; }
button { margin-top:10px; padding:10px; border:none; border-radius:8px; cursor:pointer; }
.btn-approve { background:green; color:white; }
.btn-reject { background:red; color:white; }
.btn-close { background:gray; color:white; }
#beschikbaarheidContainer { margin-top:20px; }
.slot { margin:5px 0; }
.logout-btn { margin-top:15px; background:#ff6a00; color:white; }
.logout-btn:hover { transform:scale(1.03); }
</style>
</head>
<body>

<header>🔥 Dashboard Bezoekaanvragen</header>

<div class="container">
  <div id="welcome">Welkom!</div>
  <div id="calendar"></div>

  <h3>👨‍🚒 Geef je beschikbaarheid door</h3>
  <div id="beschikbaarheidContainer"></div>
  <button onclick="opslaanBeschikbaarheid()">Opslaan Beschikbaarheid</button>
  <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3>Details aanvraag</h3>
    <p id="details"></p>
    <button class="btn-approve" onclick="updateStatus('goedgekeurd')">Goedkeuren</button>
    <button class="btn-reject" onclick="updateStatus('geweigerd')">Weigeren</button>
    <button class="btn-close" onclick="closeModal()">Sluiten</button>
  </div>
</div>

<!-- FullCalendar + Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
// 🔐 Supabase client (één keer)
const supabase = window.supabase.createClient(
  "https://elmkjlqcsshctmnbqbfq.supabase.co",
  "sb_publishable_yROKuvppBKGe-bdXd_6hzQ_w2V2v77i"
);

// Globale variabelen
let selectedId = null;
let user = null;
let profile = null;
let checkboxes = [];
let datums = ["10 april 2026","15 april 2026","22 april 2026","5 mei 2026"];
let tijden = ["10:00","13:30"];
let posten = ["Post 1","Post 2","Post 3","Post 4","Post 5","Post 6","Post 7"];

// 🌟 Initialisatie
window.onload = async () => {
  // Check ingelogd
  const { data } = await supabase.auth.getUser();
  if(!data.user) { window.location.href="login.html"; return; }
  user = data.user;

  // Profiel ophalen
  const { data: p, error } = await supabase
    .from("profiles")
    .select("*")
    .eq("user_id", user.id)
    .single();
  if(error || !p) { alert("Fout bij profiel ophalen"); return; }
  profile = p;

  if(!profile.approved) {
    alert("Je account is nog niet goedgekeurd door admin!");
    await supabase.auth.signOut();
    window.location.href="login.html";
    return;
  }

  document.getElementById("welcome").innerText = `Welkom, ${profile.name || profile.email}!`;

  // Beschikbaarheid slots laden
  laadBeschikbaarheidSlots();

  // Kalender renderen
  renderCalendar();
};

// 🔥 Kalender renderen
function renderCalendar(){
  const calendarEl = document.getElementById('calendar');
  const calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',
    locale: 'nl',
    eventClick: async function(info){
      selectedId = info.event.extendedProps.id;
      const { data: mensen } = await supabase
        .from("beschikbaarheid")
        .select("*")
        .eq("datum", info.event.extendedProps.datum);

      let lijst = mensen.map(m => `${m.user_email}${m.vervanger? " (Vervanger)":""}`).join("<br>");
      document.getElementById("details").innerHTML = `
        <b>School:</b> ${info.event.extendedProps.school}<br>
        <b>Begeleider:</b> ${info.event.extendedProps.begeleider}<br>
        <b>Email:</b> ${info.event.extendedProps.email}<br>
        <b>GSM:</b> ${info.event.extendedProps.gsm}<br>
        <b>Status:</b> ${info.event.extendedProps.status}<br>
        <b>Beschikbaar:</b><br>${lijst || "Niemand"}<br><br>
        <button onclick="meldBeschikbaar('${info.event.extendedProps.datum}')">Ik ben beschikbaar</button>
        <button onclick="vraagVervanger('${info.event.extendedProps.datum}')">Zoek vervanger</button>
      `;
      // Alleen admin kan goedkeuren/weigeren
      if(!profile.is_admin){
        document.querySelector(".btn-approve").style.display="none";
        document.querySelector(".btn-reject").style.display="none";
      } else {
        document.querySelector(".btn-approve").style.display="inline-block";
        document.querySelector(".btn-reject").style.display="inline-block";
      }

      document.getElementById("modal").style.display="block";
    }
  });
  calendar.render();
  loadEvents(calendar);
}

// 🔥 Events laden uit Supabase
async function loadEvents(calendar){
  const { data, error } = await supabase.from("aanvragen").select("*");
  if(error){ console.error(error); return; }
  data.forEach(item=>{
    let parts = item.datum.split(" - ");
    let start = convertToISO(parts[0]) + "T" + parts[1];
    // Kleur per brandweerpost
    let color = posten.indexOf(item.post) !== -1 ? `hsl(${posten.indexOf(item.post)*50},80%,50%)` : "blue";
    calendar.addEvent({
      title: item.school,
      start: start,
      color: color,
      extendedProps: item
    });
  });
}

// 🔥 Datum converteren naar ISO
function convertToISO(d){
  const maanden = { januari:"01", februari:"02", maart:"03", april:"04",
    mei:"05", juni:"06", juli:"07", augustus:"08",
    september:"09", oktober:"10", november:"11", december:"12" };
  let parts=d.split(" ");
  return `${parts[2]}-${maanden[parts[1]]}-${parts[0].padStart(2,'0')}`;
}

// 🔥 Beschikbaarheid laden
async function laadBeschikbaarheidSlots(){
  const container = document.getElementById("beschikbaarheidContainer");
  container.innerHTML="";
  checkboxes=[];
  datums.forEach(d=>{
    tijden.forEach(t=>{
      const key = d + " - " + t;
      const div = document.createElement("div");
      div.className="slot";
      const checkbox = document.createElement("input");
      checkbox.type="checkbox"; checkbox.value=key;
      checkboxes.push(checkbox);
      div.appendChild(checkbox);
      div.append(" " + key);
      container.appendChild(div);
    });
  });

  const { data } = await supabase.from("beschikbaarheid").select("*").eq("user_email",user.email);
  data.forEach(b=>{
    checkboxes.forEach(cb=>{if(cb.value===b.datum) cb.checked=true;});
  });
}

// 🔥 Beschikbaarheid opslaan
async function opslaanBeschikbaarheid(){
  await supabase.from("beschikbaarheid").delete().eq("user_email",user.email);
  const inserts = checkboxes.filter(cb=>cb.checked).map(cb=>({ user_email:user.email, datum:cb.value, vervanger:false }));
  if(inserts.length>0) await supabase.from("beschikbaarheid").insert(inserts);
  alert("✅ Beschikbaarheid opgeslagen!");
}

// 🔥 Meld beschikbaar
async function meldBeschikbaar(datum){
  await supabase.from("beschikbaarheid").upsert({ user_email:user.email, datum:datum, vervanger:false });
  alert("Je bent nu beschikbaar!");
  closeModal();
}

// 🔥 Vervanger zoeken
async function vraagVervanger(datum){
  await supabase.from("beschikbaarheid").upsert({ user_email:user.email, datum:datum, vervanger:true });
  alert("Je zoekt nu een vervanger!");
  closeModal();
}

// 🔥 Status updaten (admin)
async function updateStatus(status){
  if(!profile.is_admin){ alert("Alleen admin kan goedkeuren"); return; }
  const { error } = await supabase.from("aanvragen").update({ status:status }).eq("id",selectedId);
  if(error){ alert("Fout bij update"); return; }
  alert("Status bijgewerkt!");
  closeModal();
  window.location.reload();
}

// 🔥 Modal sluiten
function closeModal(){ document.getElementById("modal").style.display="none"; }

// 🔥 Logout
async function logout(){
  await supabase.auth.signOut();
  window.location.href="login.html";
}
</script>
</body>
</html>
