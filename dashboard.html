<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  background: linear-gradient(160deg,#ff6a00,#ffb347);
  color: white;
}

header {
  padding: 20px;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 20px;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 12px;
  margin: 5px;
  cursor: pointer;
}

.btn-main { background: white; color:#ff6a00; }
.btn-danger { background:red; color:white; }
.btn-success { background:green; color:white; }
.btn-admin { background:black; color:white; }

</style>
</head>

<body>

<header>🔥 Dashboard</header>

<div class="container">

<div class="card">
  <div id="welcome"></div>
  <button class="btn-main" onclick="logout()">Logout</button>
</div>

<div id="events"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
document.addEventListener("DOMContentLoaded", async () => {

const supabase = window.supabase.createClient(
  "https://elmkjlqcsshctmnbqbfq.supabase.co",
  "sb_publishable_yROKuvppBKGe-bdXd_6hzQ_w2V2v77i"
);

let userEmail = "";
let isAdmin = false;

// 🔐 LOGIN CHECK
const { data: { user } } = await supabase.auth.getUser();
if (!user) return window.location.href = "login.html";

userEmail = user.email;

// 🔥 PROFIEL
const { data: profile } = await supabase
  .from("profiles")
  .select("*")
  .eq("user_id", user.id)
  .single();

if (!profile.approved) {
  alert("Niet goedgekeurd!");
  return window.location.href = "login.html";
}

isAdmin = profile.is_admin;

document.getElementById("welcome").innerHTML =
  `Welkom <b>${profile.email}</b> ${isAdmin ? "(ADMIN)" : ""}`;

// 🔥 EVENTS LADEN
const { data: aanvragen } = await supabase.from("aanvragen").select("*");

const container = document.getElementById("events");

for (let event of aanvragen) {

  const { data: inschrijvingen } = await supabase
    .from("inschrijvingen")
    .select("*")
    .eq("event_id", event.id);

  let actief = inschrijvingen.filter(i => i.status === "actief");
  let vervanging = inschrijvingen.filter(i => i.status === "vervanging");

  let isIngeschreven = actief.some(i => i.user_email === userEmail);

  let html = `
  <div class="card">
    <b>${event.school}</b><br>
    ${event.datum}<br>
    Status: ${event.status}<br><br>

    👨‍🚒 Ingeschreven (${actief.length}/2):<br>
    ${actief.map(i => i.user_email).join("<br>") || "Niemand"}<br><br>

    🔁 Vervanging gevraagd:<br>
    ${vervanging.map(i => i.user_email).join("<br>") || "Geen"}<br><br>
  `;

  // 🔥 INSCHRIJVEN
  if (actief.length < 2 && !isIngeschreven) {
    html += `<button class="btn-success" onclick="inschrijven(${event.id})">Ik neem dit</button>`;
  }

  // 🔥 ANNULEREN
  if (isIngeschreven) {
    html += `<button class="btn-danger" onclick="annuleren(${event.id})">Annuleren</button>`;
    html += `<button class="btn-main" onclick="vraagVervanging(${event.id})">Vraag vervanging</button>`;
  }

  // 🔥 OVERNEMEN
  if (vervanging.length > 0 && !isIngeschreven && actief.length < 2) {
    html += `<button class="btn-main" onclick="overnemen(${event.id})">Neem over</button>`;
  }

  // 🔥 ADMIN
  if (isAdmin) {
    html += `
      <br><br>
      <button class="btn-admin" onclick="updateStatus(${event.id},'goedgekeurd')">Goedkeuren</button>
      <button class="btn-admin" onclick="updateStatus(${event.id},'geweigerd')">Weigeren</button>
    `;
  }

  html += `</div>`;

  container.innerHTML += html;
}

// 🔥 FUNCTIONS

window.inschrijven = async (id) => {
  await supabase.from("inschrijvingen").insert([{ event_id: id, user_email: userEmail }]);
  location.reload();
};

window.annuleren = async (id) => {
  await supabase.from("inschrijvingen")
    .delete()
    .eq("event_id", id)
    .eq("user_email", userEmail);
  location.reload();
};

window.vraagVervanging = async (id) => {
  await supabase.from("inschrijvingen")
    .update({ status: "vervanging" })
    .eq("event_id", id)
    .eq("user_email", userEmail);
  location.reload();
};

window.overnemen = async (id) => {
  await supabase.from("inschrijvingen").insert([{ event_id: id, user_email: userEmail }]);
  location.reload();
};

window.updateStatus = async (id, status) => {
  await supabase.from("aanvragen").update({ status }).eq("id", id);
  location.reload();
};

window.logout = async () => {
  await supabase.auth.signOut();
  window.location.href = "login.html";
};

});
</script>

</body>
</html>
