<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard – Bezoeken</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css" rel="stylesheet">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: linear-gradient(160deg, #ff6a00, #ffb347);
}

header {
  background: #c71f1f;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
}

header span.icon {
  font-size: 26px;
}

.main {
  max-width: 1200px;
  margin: 20px auto;
  padding: 20px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  border-radius: 25px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

#welcome {
  font-size: 18px;
  margin-bottom: 15px;
  color: white;
  font-weight: 600;
}

.top-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 15px;
}

#legend {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 15px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  border-radius: 12px;
  background: rgba(255,255,255,0.2);
  color: white;
  font-size: 13px;
}

.legend-color {
  width: 14px;
  height: 14px;
  border-radius: 50%;
}

#calendar {
  margin-top: 10px;
  background: white;
  border-radius: 15px;
  padding: 10px;
}

.section {
  margin-top: 25px;
}

.section h3 {
  color: white;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section h3 span.icon {
  font-size: 20px;
}

#beschikbaarheidContainer .slot {
  margin: 6px 0;
  background: rgba(255,255,255,0.92);
  padding: 10px 12px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
}

button {
  padding: 10px 14px;
  border: none;
  border-radius: 18px;
  cursor: pointer;
  font-size: 14px;
  transition: transform 0.2s;
}

button:hover {
  transform: scale(1.03);
}

.primary-btn {
  background: white;
  color: #ff6a00;
  font-weight: bold;
}

.logout-btn {
  background: #ff6a00;
  color: white;
}

.btn-approve {
  background: green;
  color: white;
}

.btn-reject {
  background: #999;
  color: white;
}

.btn-swap {
  background: #f58231;
  color: white;
}

.btn-close {
  background: #555;
  color: white;
}

.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: 100;
}

.modal-content {
  background: white;
  padding: 20px;
  max-width: 560px;
  margin: 70px auto;
  border-radius: 15px;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.modal-header h3 {
  margin: 0;
}

.modal-body p {
  margin: 6px 0;
  font-size: 14px;
  line-height: 1.5;
}

.modal-actions {
  margin-top: 15px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.note-box {
  margin-top: 10px;
  background: #fff4e8;
  border-left: 4px solid #ff6a00;
  padding: 10px;
  border-radius: 8px;
  font-size: 13px;
}

@media (max-width: 700px) {
  .main {
    width: 92%;
    padding: 15px;
  }

  .modal-content {
    margin: 30px 10px;
    width: auto;
  }
}
</style>
</head>
<body>

<header>
  <span class="icon">🔥</span>
  <span>Dashboard Bezoekaanvragen</span>
</header>

<div class="main">
  <div id="welcome">Welkom...</div>

  <div class="top-actions">
    <button id="adminBtn" class="primary-btn" style="display:none;" onclick="openAdmin()">🛠️ Adminpaneel</button>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div id="legend"></div>
  <div id="calendar"></div>

  <div class="section">
    <h3><span class="icon">📅</span>Geef je algemene beschikbaarheid door</h3>
    <div id="beschikbaarheidContainer"></div>
    <button class="primary-btn" onclick="opslaanBeschikbaarheid()">Beschikbaarheid opslaan</button>
  </div>
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Details bezoek</h3>
      <button class="btn-close" onclick="closeModal()">X</button>
    </div>

    <div class="modal-body">
      <p id="details"></p>
      <p id="bezetting"></p>
      <div class="note-box" id="ruilInfo"></div>
    </div>

    <div class="modal-actions">
      <button class="btn-approve" onclick="setBeschikbaarheidEvent(true)">Ik ben beschikbaar</button>
      <button class="btn-reject" onclick="setBeschikbaarheidEvent(false)">Ik kan niet</button>
      <button class="btn-swap" onclick="vraagRuil()">Vervanger zoeken</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/locales-all.global.min.js"></script>

<script>
const supabaseUrl = "https://elmkjlqcsshctmnbqbfq.supabase.co";
const supabaseKey = "sb_publishable_yROKuvppBKGe-bdXd_6hzQ_w2V2v77i";
const client = window.supabase.createClient(supabaseUrl, supabaseKey);

let currentUser = null;
let selectedEvent = null;
let beschikbaarheidCheckboxes = [];

const posten = [
  { naam: "Post Balen", kleur: "#e6194b", icoon: "🚒" },
  { naam: "Post Geel", kleur: "#3cb44b", icoon: "🧯" },
  { naam: "Post Grobbendonk", kleur: "#ffe119", icoon: "🔥" },
  { naam: "Post Herentals", kleur: "#4363d8", icoon: "🚨" },
  { naam: "Post Herenthout", kleur: "#f58231", icoon: "🏫" },
  { naam: "Post Mol", kleur: "#911eb4", icoon: "📟" },
  { naam: "Post Westerlo", kleur: "#46f0f0", icoon: "📞" }
];

const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
  initialView: 'dayGridMonth',
  locale: 'nl',
  height: 'auto',
  eventDisplay: 'block',
  eventClick: onEventClick
});

document.addEventListener('DOMContentLoaded', async () => {
  try {
    const { data: { user }, error: userError } = await client.auth.getUser();

    if (userError || !user) {
      window.location.href = "login.html";
      return;
    }

    const { data: profile, error: profileError } = await client
      .from("profiles")
      .select("*")
      .eq("user_id", user.id)
      .maybeSingle();

    if (profileError) {
      console.error("Profiel fout:", profileError);
      alert("Fout bij laden van profiel.");
      return;
    }

    if (!profile) {
      alert("Geen profiel gevonden voor deze gebruiker.");
      return;
    }

    if (!profile.approved) {
      alert("Je account is nog niet goedgekeurd door een admin.");
      await client.auth.signOut();
      window.location.href = "login.html";
      return;
    }

    currentUser = profile;

    document.getElementById("welcome").innerText =
      `Welkom, ${profile.name && profile.name.trim() !== "" ? profile.name : profile.email}!`;

    if (profile.is_admin === true) {
      document.getElementById("adminBtn").style.display = "inline-block";
    }

    bouwLegend();
    await loadEvents();
    calendar.render();
    await laadBeschikbaarheidSlots();
  } catch (err) {
    console.error("Onverwachte fout:", err);
    alert("Er liep iets mis bij het laden van het dashboard.");
  }
});

function bouwLegend() {
  const legend = document.getElementById("legend");
  legend.innerHTML = "";

  posten.forEach(post => {
    const item = document.createElement("div");
    item.className = "legend-item";

    const color = document.createElement("div");
    color.className = "legend-color";
    color.style.background = post.kleur;

    item.appendChild(color);
    item.appendChild(document.createTextNode(`${post.icoon} ${post.naam}`));
    legend.appendChild(item);
  });
}

async function loadEvents() {
  const { data, error } = await client
    .from("aanvragen")
    .select("*")
    .eq("status", "goedgekeurd")
    .order("datum_tijd", { ascending: true });

  if (error) {
    console.error("Fout bij laden aanvragen:", error);
    alert("Fout bij laden van de aanvragen.");
    return;
  }

  console.log("Aanvragen geladen:", data);

  calendar.removeAllEvents();

  if (!data || data.length === 0) {
    console.log("Geen goedgekeurde events gevonden.");
    return;
  }

  data.forEach(item => {
    if (!item.datum_tijd) {
      console.log("Geen datum_tijd gevonden voor:", item);
      return;
    }

    const postIndex = ((item.post_nummer || 1) - 1);
    const post = posten[postIndex] || posten[0];

    calendar.addEvent({
      id: item.id,
      title: `${post.icoon} ${item.school || "Bezoek"}`,
      start: item.datum_tijd,
      color: post.kleur,
      extendedProps: {
        ...item,
        postNaam: post.naam,
        postIcoon: post.icoon
      }
    });
  });
}

function formatDateTime(datumString) {
  const datum = new Date(datumString);

  if (isNaN(datum.getTime())) return datumString;

  return datum.toLocaleString("nl-BE", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit"
  });
}

async function onEventClick(info) {
  selectedEvent = info.event.extendedProps;

  document.getElementById("details").innerHTML = `
    <b>${selectedEvent.postIcoon} ${selectedEvent.postNaam}</b><br>
    <b>School:</b> ${selectedEvent.school || "-"}<br>
    <b>Datum:</b> ${formatDateTime(selectedEvent.datum_tijd)}<br>
    <b>Begeleider:</b> ${selectedEvent.begeleider || "-"}<br>
    <b>Email:</b> ${selectedEvent.email || "-"}<br>
    <b>GSM:</b> ${selectedEvent.gsm || "-"}<br>
    <b>Status:</b> ${selectedEvent.status || "-"}
  `;

  await updateBezetting(selectedEvent);
  document.getElementById("modal").style.display = "block";
}

async function updateBezetting(ev) {
  const { data, error } = await client
    .from("beschikbaarheid")
    .select("*")
    .eq("aanvraag_id", ev.id);

  if (error) {
    console.error("Fout bij laden bezetting:", error);
    document.getElementById("bezetting").innerHTML = "Fout bij laden van bezetting.";
    return;
  }

  const aanwezigen = (data || []).filter(x => x.aanwezig === true);
  const nodig = 2;
  const tekort = Math.max(0, nodig - aanwezigen.length);

  const lijst = aanwezigen.length > 0
    ? aanwezigen.map(x => x.user_name || x.user_email).join("<br>")
    : "Nog niemand";

  document.getElementById("bezetting").innerHTML = `
    <b>Ingeschreven begeleiders (${aanwezigen.length}/${nodig}):</b><br>
    ${lijst}<br><br>
    ${tekort > 0
      ? `<span style="color:#c71f1f;font-weight:bold;">Nog ${tekort} persoon/personen nodig</span>`
      : `<span style="color:green;font-weight:bold;">Volledig bemand</span>`}
  `;

  const ruilers = (data || []).filter(x => x.ruil_gevraagd === true);
  document.getElementById("ruilInfo").innerHTML =
    ruilers.length > 0
      ? `<b>Vervanging gevraagd door:</b><br>${ruilers.map(x => x.user_name || x.user_email).join("<br>")}`
      : `Nog geen vervanging gevraagd voor dit evenement.`;
}

async function setBeschikbaarheidEvent(aanwezig) {
  if (!selectedEvent || !currentUser) return;

  const { error: deleteError } = await client
    .from("beschikbaarheid")
    .delete()
    .eq("aanvraag_id", selectedEvent.id)
    .eq("user_email", currentUser.email);

  if (deleteError) {
    console.error(deleteError);
  }

  const { error: insertError } = await client
    .from("beschikbaarheid")
    .insert([{
      aanvraag_id: selectedEvent.id,
      datum: selectedEvent.datum_tijd,
      user_email: currentUser.email,
      user_name: currentUser.name || currentUser.email,
      aanwezig: aanwezig,
      ruil_gevraagd: false
    }]);

  if (insertError) {
    console.error("Fout bij opslaan event beschikbaarheid:", insertError);
    alert("Fout bij opslaan.");
    return;
  }

  alert(aanwezig ? "Je hebt je beschikbaar gesteld voor dit evenement." : "Je bent als niet beschikbaar gemarkeerd.");
  await updateBezetting(selectedEvent);
}

async function vraagRuil() {
  if (!selectedEvent || !currentUser) return;

  const { data: bestaand } = await client
    .from("beschikbaarheid")
    .select("*")
    .eq("aanvraag_id", selectedEvent.id)
    .eq("user_email", currentUser.email)
    .maybeSingle();

  if (!bestaand) {
    alert("Je moet je eerst beschikbaar zetten voor dit evenement voor je een vervanger kan vragen.");
    return;
  }

  const { error } = await client
    .from("beschikbaarheid")
    .update({ ruil_gevraagd: true })
    .eq("aanvraag_id", selectedEvent.id)
    .eq("user_email", currentUser.email);

  if (error) {
    console.error(error);
    alert("Fout bij aanvragen van vervanging.");
    return;
  }

  alert("Je hebt een vervanger gevraagd.");
  await updateBezetting(selectedEvent);
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
  selectedEvent = null;
}

async function laadBeschikbaarheidSlots() {
  const container = document.getElementById("beschikbaarheidContainer");
  container.innerHTML = "";
  beschikbaarheidCheckboxes = [];

  const { data: events, error } = await client
    .from("aanvragen")
    .select("id, school, datum_tijd, status")
    .eq("status", "goedgekeurd")
    .order("datum_tijd", { ascending: true });

  if (error) {
    console.error("Fout bij laden beschikbaarheidssloten:", error);
    return;
  }

  const { data: bestaande, error: bestaandeError } = await client
    .from("beschikbaarheid")
    .select("*")
    .eq("user_email", currentUser.email);

  if (bestaandeError) {
    console.error("Fout bij laden bestaande beschikbaarheid:", bestaandeError);
    return;
  }

  (events || []).forEach(ev => {
    const div = document.createElement("div");
    div.className = "slot";

    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.value = ev.id;

    if ((bestaande || []).some(b => Number(b.aanvraag_id) === Number(ev.id) && b.aanwezig === true)) {
      cb.checked = true;
    }

    const label = document.createElement("span");
    label.textContent = `📅 ${formatDateTime(ev.datum_tijd)} — ${ev.school || "Bezoek"}`;

    beschikbaarheidCheckboxes.push({
      checkbox: cb,
      eventData: ev
    });

    div.appendChild(cb);
    div.appendChild(label);
    container.appendChild(div);
  });
}

async function opslaanBeschikbaarheid() {
  if (!currentUser) return;

  const { error: deleteError } = await client
    .from("beschikbaarheid")
    .delete()
    .eq("user_email", currentUser.email)
    .is("aanvraag_id", null);

  if (deleteError) {
    console.error(deleteError);
  }

  const inserts = beschikbaarheidCheckboxes
    .filter(item => item.checkbox.checked)
    .map(item => ({
      aanvraag_id: item.eventData.id,
      datum: item.eventData.datum_tijd,
      user_email: currentUser.email,
      user_name: currentUser.name || currentUser.email,
      aanwezig: true,
      ruil_gevraagd: false
    }));

  if (inserts.length > 0) {
    for (const item of inserts) {
      await client
        .from("beschikbaarheid")
        .delete()
        .eq("aanvraag_id", item.aanvraag_id)
        .eq("user_email", currentUser.email);

      await client.from("beschikbaarheid").insert([item]);
    }
  }

  alert("Beschikbaarheid opgeslagen.");
}

function openAdmin() {
  window.location.href = "admin.html";
}

async function logout() {
  await client.auth.signOut();
  window.location.href = "login.html";
}
</script>

</body>
</html>
