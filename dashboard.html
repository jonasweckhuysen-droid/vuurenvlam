<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background: linear-gradient(160deg,#ff6a00,#ffb347);
}

header {
  background:#c71f1f;
  color:white;
  padding:20px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.container {
  max-width:1100px;
  margin:20px auto;
  background:white;
  padding:20px;
  border-radius:20px;
}

#welcome {
  font-size:20px;
  margin-bottom:15px;
}

#calendar {
  margin-top:20px;
}

button {
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin-top:10px;
}

.logout {
  background:#ff6a00;
  color:white;
}

.modal {
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
}

.modal-box {
  background:white;
  padding:20px;
  max-width:400px;
  margin:100px auto;
  border-radius:10px;
}
</style>
</head>

<body>

<header>🔥 Dashboard</header>

<div class="container">
  <div id="welcome"></div>

  <div id="calendar"></div>

  <h3>Beschikbaarheid</h3>
  <div id="slots"></div>
  <button onclick="saveAvailability()">Opslaan</button>

  <button class="logout" onclick="logout()">Logout</button>
</div>

<div id="modal" class="modal">
  <div class="modal-box">
    <h3>Details</h3>
    <div id="details"></div>

    <button id="approveBtn">Goedkeuren</button>
    <button id="rejectBtn">Weigeren</button>
    <button onclick="closeModal()">Sluiten</button>
  </div>
</div>

<!-- ✅ SLECHTS 1x SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<!-- ✅ SLECHTS 1 SCRIPT -->
<script>

// 🔥 SUPABASE (NOOIT MEER DAN 1 KEER!)
const supabase = window.supabase.createClient(
  "https://elmkjlqcsshctmnbqbfq.supabase.co",
  "sb_publishable_yROKuvppBKGe-bdXd_6hzQ_w2V2v77i"
);

let user = null;
let selectedId = null;
let checkboxes = [];

// 🔐 LOGIN CHECK
init();

async function init() {

  const res = await supabase.auth.getUser();
  user = res.data.user;

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  // profiel ophalen
  const { data: profile } = await supabase
    .from("profiles")
    .select("*")
    .eq("user_id", user.id)
    .single();

  if (!profile) {
    alert("Geen profiel gevonden");
    return;
  }

  if (!profile.approved) {
    alert("Nog niet goedgekeurd!");
    await supabase.auth.signOut();
    window.location.href = "login.html";
    return;
  }

  // welkom tekst
  document.getElementById("welcome").innerText =
    "Welkom, " + (profile.name || profile.email);

  // admin knoppen
  if (!profile.is_admin) {
    document.getElementById("approveBtn").style.display = "none";
    document.getElementById("rejectBtn").style.display = "none";
  }

  loadCalendar();
  loadSlots();
}

// 🔥 KALENDER
function loadCalendar() {

  const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
    initialView: 'dayGridMonth',
    locale: 'nl',

    eventClick: async function(info) {
      selectedId = info.event.extendedProps.id;

      document.getElementById("details").innerHTML =
        "School: " + info.event.extendedProps.school;

      document.getElementById("modal").style.display = "block";
    }
  });

  calendar.render();

  loadEvents(calendar);
}

// 🔥 EVENTS
async function loadEvents(calendar) {

  const { data } = await supabase.from("aanvragen").select("*");

  data.forEach(item => {

    let parts = item.datum.split(" - ");
    let iso = toISO(parts[0]) + "T" + parts[1];

    calendar.addEvent({
      title: item.school,
      start: iso,
      color: item.status === "goedgekeurd" ? "green" :
             item.status === "geweigerd" ? "red" : "orange",
      extendedProps: item
    });
  });
}

// 🔥 DATUM
function toISO(datum) {

  const m = {
    januari:"01", februari:"02", maart:"03", april:"04",
    mei:"05", juni:"06", juli:"07", augustus:"08",
    september:"09", oktober:"10", november:"11", december:"12"
  };

  let p = datum.split(" ");
  return `${p[2]}-${m[p[1]]}-${p[0].padStart(2,'0')}`;
}

// 🔥 MODAL
function closeModal() {
  document.getElementById("modal").style.display = "none";
}

// 🔥 ADMIN
document.getElementById("approveBtn").onclick = () => updateStatus("goedgekeurd");
document.getElementById("rejectBtn").onclick = () => updateStatus("geweigerd");

async function updateStatus(status) {
  await supabase.from("aanvragen").update({status}).eq("id", selectedId);
  location.reload();
}

// 🔥 BESCHIKBAARHEID
function loadSlots() {

  const datums = ["10 april 2026","15 april 2026","22 april 2026","5 mei 2026"];
  const tijden = ["10:00","13:30"];

  const container = document.getElementById("slots");

  datums.forEach(d => {
    tijden.forEach(t => {

      const key = d + " - " + t;

      const div = document.createElement("div");

      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.value = key;

      checkboxes.push(cb);

      div.appendChild(cb);
      div.append(" " + key);

      container.appendChild(div);
    });
  });
}

// opslaan
async function saveAvailability() {

  await supabase
    .from("beschikbaarheid")
    .delete()
    .eq("user_email", user.email);

  const inserts = checkboxes
    .filter(c => c.checked)
    .map(c => ({
      user_email: user.email,
      datum: c.value
    }));

  if (inserts.length > 0) {
    await supabase.from("beschikbaarheid").insert(inserts);
  }

  alert("Opgeslagen!");
}

// logout
async function logout() {
  await supabase.auth.signOut();
  window.location.href = "login.html";
}

</script>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.js"></script>

</body>
</html>
