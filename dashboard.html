<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Bezoeken</title>
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css" rel="stylesheet">
<style>
body { font-family:'Segoe UI'; margin:0; background: linear-gradient(160deg,#ff6a00,#ffb347); }
header { background:#c71f1f; color:white; padding:15px; text-align:center; font-size:24px; font-weight:bold; }
.container { max-width:1100px; margin:20px auto; padding:20px; background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border-radius:25px; box-shadow:0 10px 25px rgba(0,0,0,0.2); }
#welcome { font-size:20px; margin-bottom:15px; color:white; }
#calendar { margin-top:20px; background:white; border-radius:15px; padding:10px; }
h3 { margin-top:30px; color:white; }
#beschikbaarheidContainer { margin-top:15px; }
.slot { margin:8px 0; color:white; }
input[type=checkbox] { margin-right:8px; }
button { padding:10px 15px; border:none; border-radius:20px; cursor:pointer; font-weight:bold; }
button:hover { transform: scale(1.03); }
.btn-approve { background:green; color:white; }
.btn-reject { background:red; color:white; }
.btn-close { background:gray; color:white; }
.logout-btn { background:#ff6a00; color:white; margin-top:20px; display:block; width:150px; text-align:center; }
.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); z-index:100; }
.modal-content { background:white; padding:20px; max-width:500px; margin:100px auto; border-radius:15px; }
</style>
</head>
<body>

<header>🔥 Dashboard Bezoekaanvragen</header>

<div class="container">
  <div id="welcome">Welkom!</div>
  <div id="calendar"></div>
  <h3>👨‍🚒 Geef je beschikbaarheid door</h3>
  <div id="beschikbaarheidContainer"></div>
  <button onclick="opslaanBeschikbaarheid()">Opslaan Beschikbaarheid</button>
  <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3>Details aanvraag</h3>
    <p id="details"></p>
    <button id="approveBtn" class="btn-approve">Goedkeuren</button>
    <button id="rejectBtn" class="btn-reject">Weigeren</button>
    <button class="btn-close" onclick="closeModal()">Sluiten</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.js"></script>

<script>
const supabaseUrl = "https://elmkjlqcsshctmnbqbfq.supabase.co";
const supabaseKey = "sb_publishable_yROKuvppBKGe-bdXd_6hzQ_w2V2v77i";
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

let selectedId = null;
let userId = null;
let userName = "";
let userEmail = "";
let checkboxes = [];

// 🔐 Login check
(async () => {
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) { window.location.href = "login.html"; return; }

  userId = user.id;
  userEmail = user.email;

  const { data: profile } = await supabase
    .from("profiles")
    .select("name, is_admin, approved")
    .eq("user_id", userId)
    .single();

  if (!profile || !profile.approved) {
    alert("Je account is nog niet goedgekeurd door de admin!");
    await supabase.auth.signOut();
    window.location.href="login.html";
    return;
  }

  userName = profile.name || userEmail;
  document.getElementById("welcome").innerText = `Welkom, ${userName}!${profile.is_admin ? " (Admin)" : ""}`;

  laadBeschikbaarheidSlots();
  loadData(profile.is_admin);
})();

// 🔥 Kalender setup
const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
  initialView:'dayGridMonth',
  locale:'nl',
  eventClick: async function(info){
    selectedId = info.event.extendedProps.id;

    const { data: aanwezigen } = await supabase
      .from("beschikbaarheid")
      .select("user_email")
      .eq("datum", info.event.extendedProps.datum);

    let lijst = aanwezigen.map(a=>a.user_email).join("<br>");
    document.getElementById("details").innerHTML = `
      <b>School:</b> ${info.event.extendedProps.school}<br>
      <b>Begeleider:</b> ${info.event.extendedProps.begeleider}<br>
      <b>Email:</b> ${info.event.extendedProps.email}<br>
      <b>GSM:</b> ${info.event.extendedProps.gsm}<br>
      <b>Status:</b> ${info.event.extendedProps.status}<br>
      <b>Beschikbaar:</b><br>${lijst || "Niemand"}
    `;

    // Admin knoppen
    const approveBtn = document.getElementById("approveBtn");
    const rejectBtn = document.getElementById("rejectBtn");
    const { data: profile } = await supabase
      .from("profiles")
      .select("*").eq("user_id", userId).single();

    if(profile.is_admin){
      approveBtn.style.display="inline-block";
      rejectBtn.style.display="inline-block";
      approveBtn.onclick = ()=>updateStatus('goedgekeurd');
      rejectBtn.onclick = ()=>updateStatus('geweigerd');
    } else {
      approveBtn.style.display="none";
      rejectBtn.style.display="none";
    }

    document.getElementById("modal").style.display="block";
  }
});
calendar.render();

// 🔥 Data laden
async function loadData(isAdmin=false){
  const { data, error } = await supabase.from("aanvragen").select("*");
  if(error){ console.error(error); return; }

  data.forEach(item=>{
    let date = item.datum; // Zorg dat datum in ISO-formaat in DB staat
    calendar.addEvent({
      title: item.school,
      start: date,
      color: item.status==="nieuw"?"orange":item.status==="goedgekeurd"?"green":item.status==="geweigerd"?"red":"blue",
      extendedProps: item
    });
  });
}

async function updateStatus(status){
  const { error } = await supabase.from("aanvragen").update({ status }).eq("id", selectedId);
  if(error){ alert("Fout bij update"); return; }
  location.reload();
}

function closeModal(){ document.getElementById("modal").style.display="none"; }

// 🔥 Beschikbaarheid
const datums = ["2026-04-10","2026-04-15","2026-04-22","2026-05-05"];
const tijden = ["10:00","13:30"];
function laadBeschikbaarheidSlots(){
  const container = document.getElementById("beschikbaarheidContainer");
  container.innerHTML="";
  checkboxes=[];

  datums.forEach(datum=>{
    tijden.forEach(tijd=>{
      const key = datum+" "+tijd;
      const div=document.createElement("div");
      div.className="slot";
      const checkbox=document.createElement("input");
      checkbox.type="checkbox";
      checkbox.value=key;
      checkboxes.push(checkbox);
      div.appendChild(checkbox);
      div.append(" "+key);
      container.appendChild(div);
    });
  });

  (async()=>{
    const { data: bestaande } = await supabase
      .from("beschikbaarheid")
      .select("datum")
      .eq("user_email", userEmail);

    bestaande.forEach(b=>{
      checkboxes.forEach(cb=>{ if(cb.value===b.datum) cb.checked=true; });
    });
  })();
}

async function opslaanBeschikbaarheid(){
  const selectedSlots = checkboxes.filter(cb=>cb.checked).map(cb=>cb.value);
  // Max 2 check
  for(const slot of selectedSlots){
    const { data } = await supabase.from("beschikbaarheid").select("*").eq("datum",slot);
    if(data.length>=2 && !data.some(d=>d.user_email===userEmail)){
      alert(`Slot ${slot} is al vol (max 2 personen)`);
      return;
    }
  }

  await supabase.from("beschikbaarheid").delete().eq("user_email",userEmail);
  const inserts = selectedSlots.map(slot=>({ user_email:userEmail, datum:slot }));
  if(inserts.length>0) await supabase.from("beschikbaarheid").insert(inserts);
  alert("✅ Beschikbaarheid opgeslagen!");
}

// 🔥 Logout
async function logout(){
  await supabase.auth.signOut();
  window.location.href="login.html";
}
</script>
</body>
</html>
