<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Segoe UI';
  background: linear-gradient(160deg,#ff6a00,#ffb347);
}

header {
  background:#c71f1f;
  color:white;
  padding:20px;
  text-align:center;
  font-size:22px;
}

.container {
  max-width:1000px;
  margin:20px auto;
  background:white;
  padding:20px;
  border-radius:20px;
}

button {
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin-top:10px;
}

.logout {
  background:#ff6a00;
  color:white;
}
</style>
</head>

<body>

<header>🔥 Dashboard</header>

<div class="container">
  <div id="welcome"></div>
  <div id="calendar"></div>

  <button class="logout" id="logoutBtn">Logout</button>
</div>

<!-- ✅ SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<!-- ✅ JUISTE FULLCALENDAR -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>

window.onload = async function() {

  const supabase = window.supabase.createClient(
    "https://elmkjlqcsshctmnbqbfq.supabase.co",
    "sb_publishable_yROKuvppBKGe-bdXd_6hzQ_w2V2v77i"
  );

  const { data: { user } } = await supabase.auth.getUser();

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  document.getElementById("welcome").innerText =
    "Welkom " + user.email;

  // 🔥 NU WERKT DIT
  const calendar = new FullCalendar.Calendar(
    document.getElementById('calendar'),
    {
      initialView: 'dayGridMonth',
      locale: 'nl'
    }
  );

  calendar.render();

  const { data, error } = await supabase
    .from("aanvragen")
    .select("*");

  console.log("DATA:", data);

  if (error) {
    console.error(error);
    return;
  }

  data.forEach(item => {
    if (!item.datum_tijd) return;

    calendar.addEvent({
      title: item.school || "Geen naam",
      start: item.datum_tijd
    });
  });

  document.getElementById("logoutBtn").onclick = async () => {
    await supabase.auth.signOut();
    window.location.href = "login.html";
  };

};

</script>

</body>
</html>
