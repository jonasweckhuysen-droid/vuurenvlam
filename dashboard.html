<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Segoe UI';
  background: linear-gradient(160deg,#ff6a00,#ffb347);
}

header {
  background:#c71f1f;
  color:white;
  padding:20px;
  text-align:center;
  font-size:22px;
}

.container {
  max-width:1100px;
  margin:20px auto;
  background:white;
  padding:20px;
  border-radius:20px;
}

#welcome {
  font-size:20px;
  margin-bottom:15px;
}

#calendar {
  margin-top:20px;
}

button {
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin-top:10px;
}

.logout {
  background:#ff6a00;
  color:white;
}

.modal {
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
}

.modal-box {
  background:white;
  padding:20px;
  max-width:400px;
  margin:100px auto;
  border-radius:10px;
}
</style>
</head>

<body>

<header>🔥 Dashboard</header>

<div class="container">
  <div id="welcome"></div>

  <div id="calendar"></div>

  <h3>Beschikbaarheid</h3>
  <div id="slots"></div>
  <button onclick="saveAvailability()">Opslaan</button>

  <button class="logout" onclick="logout()">Logout</button>
</div>

<div id="modal" class="modal">
  <div class="modal-box">
    <h3>Details</h3>
    <div id="details"></div>

    <button id="approveBtn">Goedkeuren</button>
    <button id="rejectBtn">Weigeren</button>
    <button onclick="closeModal()">Sluiten</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.js"></script>

<script>

// 🔥 SUPABASE
const supabase = window.supabase.createClient(
  "https://elmkjlqcsshctmnbqbfq.supabase.co",
  "sb_publishable_yROKuvppBKGe-bdXd_6hzQ_w2V2v77i"
);

let user = null;
let selectedId = null;
let checkboxes = [];

// 🔐 INIT
init();

async function init() {

  const { data: { user: u } } = await supabase.auth.getUser();
  if (!u) return window.location.href = "login.html";

  user = u;

  const { data: profile } = await supabase
    .from("profiles")
    .select("*")
    .eq("user_id", user.id)
    .single();

  if (!profile.approved) {
    alert("Nog niet goedgekeurd!");
    await supabase.auth.signOut();
    return window.location.href = "login.html";
  }

  document.getElementById("welcome").innerText =
    "Welkom, " + (profile.name || profile.email);

  if (!profile.is_admin) {
    document.getElementById("approveBtn").style.display = "none";
    document.getElementById("rejectBtn").style.display = "none";
  }

  loadCalendar();
  loadSlots();
}

// 📅 KALENDER
function loadCalendar() {

  const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
    initialView: 'dayGridMonth',
    locale: 'nl',

    eventClick: function(info) {

      selectedId = info.event.extendedProps.id;

      document.getElementById("details").innerHTML = `
        <b>School:</b> ${info.event.extendedProps.school}<br>
        <b>Status:</b> ${info.event.extendedProps.status}
      `;

      document.getElementById("modal").style.display = "block";
    }
  });

  calendar.render();

  loadEvents(calendar);
}

// 📊 EVENTS LADEN (NU CORRECT!)
async function loadEvents(calendar) {

  const { data, error } = await supabase
    .from("aanvragen")
    .select("*");

  if (error) {
    console.error(error);
    return;
  }

  console.log("Aanvragen:", data);

  data.forEach(item => {

    if (!item.datum_tijd) return;

    calendar.addEvent({
      title: item.school,
      start: item.datum_tijd, // 🔥 DIRECT!
      color:
        item.status === "goedgekeurd" ? "green" :
        item.status === "geweigerd" ? "red" : "orange",
      extendedProps: item
    });

  });
}

// 🔥 MODAL
function closeModal() {
  document.getElementById("modal").style.display = "none";
}

// 🔥 ADMIN
document.getElementById("approveBtn").onclick = () => updateStatus("goedgekeurd");
document.getElementById("rejectBtn").onclick = () => updateStatus("geweigerd");

async function updateStatus(status) {
  await supabase.from("aanvragen")
    .update({ status })
    .eq("id", selectedId);

  location.reload();
}

// 🔥 BESCHIKBAARHEID
function loadSlots() {

  const datums = [
    "2026-04-10 10:00:00",
    "2026-04-10 13:30:00",
    "2026-04-15 10:00:00",
    "2026-04-15 13:30:00"
  ];

  const container = document.getElementById("slots");

  datums.forEach(d => {

    const div = document.createElement("div");

    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.value = d;

    checkboxes.push(cb);

    div.appendChild(cb);
    div.append(" " + new Date(d).toLocaleString());

    container.appendChild(div);
  });
}

// opslaan
async function saveAvailability() {

  await supabase
    .from("beschikbaarheid")
    .delete()
    .eq("user_email", user.email);

  const inserts = checkboxes
    .filter(c => c.checked)
    .map(c => ({
      user_email: user.email,
      datum: c.value
    }));

  if (inserts.length > 0) {
    await supabase.from("beschikbaarheid").insert(inserts);
  }

  alert("✅ Opgeslagen!");
}

// logout
async function logout() {
  await supabase.auth.signOut();
  window.location.href = "login.html";
}

</script>

</body>
</html>
