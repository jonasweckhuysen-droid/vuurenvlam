<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Bezoeken</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css" rel="stylesheet">

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f4f4;
}

header {
  background: #c71f1f;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.container {
  max-width: 1100px;
  margin: 20px auto;
  padding: 20px;
  background: white;
  border-radius: 10px;
}

#calendar {
  margin-top: 20px;
}

.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

.modal-content {
  background: white;
  padding: 20px;
  max-width: 400px;
  margin: 100px auto;
  border-radius: 10px;
}

button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.btn-approve { background: green; color: white; }
.btn-reject { background: red; color: white; }
.btn-close { background: gray; color: white; }

</style>
</head>

<body>

<header>🔥 Dashboard Bezoekaanvragen</header>

<div class="container">
  <div id="calendar"></div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3>Details aanvraag</h3>
    <p id="details"></p>

    <button class="btn-approve" onclick="updateStatus('goedgekeurd')">Goedkeuren</button>
    <button class="btn-reject" onclick="updateStatus('geweigerd')">Weigeren</button>
    <button class="btn-close" onclick="closeModal()">Sluiten</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.js"></script>

<script>
const supabaseUrl = "https://elmkjlqcsshctmnbqbfq.supabase.co";
const supabaseKey = "sb_publishable_yROKuvppBKGe-bdXd_6hzQ_w2V2v77i";
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

let selectedId = null;

// 🔥 Kalender starten
const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
  initialView: 'dayGridMonth',
  locale: 'nl',
  eventClick: function(info) {
    selectedId = info.event.extendedProps.id;

    document.getElementById("details").innerHTML = `
      <b>School:</b> ${info.event.extendedProps.school}<br>
      <b>Begeleider:</b> ${info.event.extendedProps.begeleider}<br>
      <b>Email:</b> ${info.event.extendedProps.email}<br>
      <b>GSM:</b> ${info.event.extendedProps.gsm}<br>
      <b>Aantal:</b> ${info.event.extendedProps.aantal}<br>
      <b>Status:</b> ${info.event.extendedProps.status}
    `;

    document.getElementById("modal").style.display = "block";
  }
});

calendar.render();

// 🔥 Data laden uit Supabase
async function loadData() {
  const { data, error } = await supabase.from("aanvragen").select("*");

  if (error) {
    console.error(error);
    return;
  }

  data.forEach(item => {

    // datum splitsen (vb: "10 april 2026 - 10:00")
    let parts = item.datum.split(" - ");
    let date = convertToISO(parts[0]) + "T" + parts[1];

    calendar.addEvent({
      title: item.school,
      start: date,
      color: getColor(item.status),
      extendedProps: item
    });

  });
}

// 🔥 Datum converteren naar ISO
function convertToISO(datum) {
  const maanden = {
    januari: "01", februari: "02", maart: "03", april: "04",
    mei: "05", juni: "06", juli: "07", augustus: "08",
    september: "09", oktober: "10", november: "11", december: "12"
  };

  let parts = datum.split(" ");
  let dag = parts[0];
  let maand = maanden[parts[1]];
  let jaar = parts[2];

  return `${jaar}-${maand}-${dag.padStart(2,'0')}`;
}

// 🔥 Kleur op basis van status
function getColor(status) {
  if (status === "nieuw") return "orange";
  if (status === "goedgekeurd") return "green";
  if (status === "geweigerd") return "red";
  return "blue";
}

// 🔥 Status aanpassen
async function updateStatus(status) {
  const { error } = await supabase
    .from("aanvragen")
    .update({ status: status })
    .eq("id", selectedId);

  if (error) {
    alert("Fout bij update");
    return;
  }

  location.reload();
}

// 🔥 Modal sluiten
function closeModal() {
  document.getElementById("modal").style.display = "none";
}

// Start
loadData();

</script>

</body>
</html>
