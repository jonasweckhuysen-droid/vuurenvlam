<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vuur & Vlam</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #ff7b00, #ffb347);
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
    }

    img {
      width: 80%;
      max-width: 400px;
      margin-top: 20px;
    }

    .btn {
      display: block;
      margin: 20px auto;
      padding: 15px;
      width: 80%;
      max-width: 300px;
      background: white;
      color: #ff7b00;
      border-radius: 10px;
      font-size: 18px;
      text-decoration: none;
      font-weight: bold;
    }

    .btn:hover {
      background: #ffe0c2;
    }
  </style>
</head>

<body>

  <header>🔥 Vuur & Vlam 🔥</header>

  <img src="mascotte.png" alt="Mascotte">

  <a href="#" class="btn">Bezoek aanvragen</a>
  <a href="#" class="btn">Inloggen</a>

</body>
</html>
