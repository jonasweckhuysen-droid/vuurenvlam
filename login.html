<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(160deg, #ff6a00, #ffb347);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  padding: 20px;
}

.container {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 30px;
  border-radius: 28px;
  width: 100%;
  max-width: 380px;
  text-align: center;
  box-shadow: 0 12px 28px rgba(0,0,0,0.22);
}

h2 {
  color: white;
  margin-bottom: 22px;
  font-size: 28px;
}

.input-group {
  margin-bottom: 15px;
}

input[type="email"],
input[type="password"] {
  width: 100%;
  padding: 14px 16px;
  border-radius: 16px;
  border: none;
  font-size: 16px;
  outline: none;
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.06);
}

input[type="email"]:focus,
input[type="password"]:focus {
  box-shadow: 0 0 0 3px rgba(255,255,255,0.25);
}

.remember-wrap {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 10px;
  margin-bottom: 18px;
  color: white;
  font-size: 15px;
  text-align: left;
}

.remember-wrap input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: #ff6a00;
  cursor: pointer;
}

.remember-wrap label {
  cursor: pointer;
}

button {
  width: 100%;
  padding: 15px;
  background: white;
  color: #ff6a00;
  font-weight: bold;
  font-size: 16px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  box-shadow: 0 6px 16px rgba(0,0,0,0.15);
  transition: transform 0.2s ease, opacity 0.2s ease;
}

button:hover {
  transform: scale(1.03);
}

button:disabled {
  opacity: 0.7;
  cursor: not-allowed;
  transform: none;
}

p {
  color: white;
  margin-top: 18px;
  font-size: 15px;
}

p a {
  color: white;
  text-decoration: underline;
  font-weight: 600;
}

/* Popup */
.popup-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  display: none;
  justify-content: center;
  align-items: center;
  padding: 20px;
  z-index: 9999;
}

.popup-overlay.show {
  display: flex;
}

.popup-box {
  width: 100%;
  max-width: 360px;
  background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,245,238,0.96));
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 18px 40px rgba(0,0,0,0.3);
  animation: popupIn 0.25s ease;
}

.popup-top {
  padding: 18px 20px;
  color: white;
  font-size: 20px;
  font-weight: 700;
  text-align: center;
}

.popup-top.success {
  background: linear-gradient(135deg, #ff6a00, #ff9f43);
}

.popup-top.error {
  background: linear-gradient(135deg, #c71f1f, #ff6a00);
}

.popup-body {
  padding: 22px 20px 18px;
  text-align: center;
  color: #333;
}

.popup-icon {
  font-size: 42px;
  margin-bottom: 10px;
}

.popup-message {
  font-size: 15px;
  line-height: 1.5;
  margin-bottom: 18px;
}

.popup-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 16px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  background: linear-gradient(135deg, #ff6a00, #ff9f43);
  color: white;
  box-shadow: 0 8px 18px rgba(255,106,0,0.25);
}

.popup-btn:hover {
  transform: scale(1.02);
}

@keyframes popupIn {
  from {
    opacity: 0;
    transform: translateY(12px) scale(0.96);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

@media (max-width: 480px) {
  .container {
    padding: 24px 20px;
    border-radius: 24px;
  }

  h2 {
    font-size: 24px;
  }

  input,
  button {
    font-size: 16px;
  }
}
</style>
</head>

<body>

<div class="container">
  <h2>🔐 Login</h2>

  <div class="input-group">
    <input type="email" id="email" placeholder="Email" autocomplete="email">
  </div>

  <div class="input-group">
    <input type="password" id="password" placeholder="Wachtwoord" autocomplete="current-password">
  </div>

  <div class="remember-wrap">
    <input type="checkbox" id="rememberMe">
    <label for="rememberMe">Onthoud mij</label>
  </div>

  <button id="loginBtn">Login</button>

  <p>
    Nog geen account?
    <a href="register.html">Registreer</a>
  </p>
</div>

<div id="popup" class="popup-overlay">
  <div class="popup-box">
    <div id="popupTop" class="popup-top success">Melding</div>
    <div class="popup-body">
      <div id="popupIcon" class="popup-icon">🔥</div>
      <div id="popupMessage" class="popup-message">Bericht</div>
      <button id="popupCloseBtn" class="popup-btn">OK</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const client = window.supabase.createClient(
    "https://elmkjlqcsshctmnbqbfq.supabase.co",
    "sb_publishable_yROKuvppBKGe-bdXd_6hzQ_w2V2v77i"
  );

  const loginBtn = document.getElementById("loginBtn");
  const popup = document.getElementById("popup");
  const popupTop = document.getElementById("popupTop");
  const popupIcon = document.getElementById("popupIcon");
  const popupMessage = document.getElementById("popupMessage");
  const popupCloseBtn = document.getElementById("popupCloseBtn");
  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const rememberMe = document.getElementById("rememberMe");

  let redirectAfterClose = null;

  const opgeslagenEmail = localStorage.getItem("rememberedEmail");
  if (opgeslagenEmail) {
    emailInput.value = opgeslagenEmail;
    rememberMe.checked = true;
  }

  function showPopup(type, title, message, redirectUrl = null) {
    popupTop.textContent = title;
    popupMessage.textContent = message;
    redirectAfterClose = redirectUrl;

    popupTop.classList.remove("success", "error");

    if (type === "success") {
      popupTop.classList.add("success");
      popupIcon.textContent = "✅";
    } else {
      popupTop.classList.add("error");
      popupIcon.textContent = "⚠️";
    }

    popup.classList.add("show");
  }

  function closePopup() {
    popup.classList.remove("show");

    if (redirectAfterClose) {
      window.location.href = redirectAfterClose;
    }
  }

  popupCloseBtn.addEventListener("click", closePopup);

  popup.addEventListener("click", (e) => {
    if (e.target === popup) {
      closePopup();
    }
  });

  async function login() {
    const email = emailInput.value.trim();
    const password = passwordInput.value;

    if (!email || !password) {
      showPopup("error", "Ontbrekende gegevens", "Vul je e-mail en wachtwoord in.");
      return;
    }

    loginBtn.disabled = true;
    loginBtn.textContent = "Bezig met inloggen...";

    const { data, error } = await client.auth.signInWithPassword({
      email,
      password
    });

    if (error) {
      loginBtn.disabled = false;
      loginBtn.textContent = "Login";
      showPopup("error", "Login mislukt", "Fout bij login: " + error.message);
      return;
    }

    const { data: profile, error: profileError } = await client
      .from("profiles")
      .select("*")
      .eq("user_id", data.user.id)
      .single();

    if (profileError || !profile) {
      loginBtn.disabled = false;
      loginBtn.textContent = "Login";
      showPopup("error", "Accountprobleem", "Er is een probleem met je account. Contacteer de beheerder.");
      return;
    }

    if (rememberMe.checked) {
      localStorage.setItem("rememberedEmail", email);
    } else {
      localStorage.removeItem("rememberedEmail");
    }

    loginBtn.textContent = "Gelukt!";
    showPopup("success", "Login geslaagd", "Welkom terug! Je wordt doorgestuurd naar het dashboard.", "dashboard.html");
  }

  loginBtn.addEventListener("click", login);

  passwordInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      login();
    }
  });

  emailInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      login();
    }
  });
});
</script>

</body>
</html>
