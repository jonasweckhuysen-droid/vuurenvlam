<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registreren</title>
<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(160deg, #ff6a00, #ffb347);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  color: white;
}
.container {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  padding: 30px;
  border-radius: 25px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  width: 350px;
}
input {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border-radius: 15px;
  border: none;
  font-size: 16px;
}
button {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 20px;
  font-size: 18px;
  font-weight: bold;
  background: white;
  color: #ff6a00;
  cursor: pointer;
}
button:hover { transform: scale(1.03); }
a { color: white; text-decoration: underline; }
</style>
</head>
<body>

<div class="container">
  <h2>👨‍🚒 Registreren</h2>
  <input type="text" id="name" placeholder="Naam"><br>
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Wachtwoord"><br>
  <button onclick="register()">Registreren</button>
  <p>Al een account? <a href="login.html">Login</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const supabase = window.supabase.createClient(
  "https://elmkjlqcsshctmnbqbfq.supabase.co",
  "sb_publishable_yROKuvppBKGe-bdXd_6hzQ_w2V2v77i"
);

async function register() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const name = document.getElementById("name").value;

  const { data: user, error } = await supabase.auth.signUp({ email, password });

  if (error) {
    alert(error.message);
    return;
  }

  // ✅ Voeg profiel toe aan 'profiles' tabel met approved = false
  await supabase.from("profiles").insert({
    user_id: user.user.id,
    email: email,
    name: name,
    approved: false
  });

  alert("Account aangemaakt! Wacht op goedkeuring van de beheerder.");
  window.location.href = "login.html";
}
</script>

</body>
</html>
