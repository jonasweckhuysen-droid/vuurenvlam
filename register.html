<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Registreren</title>
</head>
<body>

<h2>👨‍🚒 Registreren</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Wachtwoord"><br><br>

<button onclick="register()">Registreren</button>

<p>Al een account? <a href="login.html">Login</a></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabase = window.supabase.createClient(
  "https://elmkjlqcsshctmnbqbfq.supabase.co",
  "sb_publishable_yROKuvppBKGe-bdXd_6hzQ_w2V2v77i"
);

async function register() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signUp({
    email: email,
    password: password
  });

  if (error) {
    alert(error.message);
  } else {
    alert("Account aangemaakt!");
    window.location.href = "login.html";
  }
}
</script>

</body>
</html>
