<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TEST SUPABASE</title>
</head>
<body>

<h2>TEST SUPABASE</h2>

<input id="email" placeholder="email"><br><br>
<input id="password" placeholder="password"><br><br>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabase = window.supabase.createClient(
  "https://elmkjlqcsshctmnbqbfq.supabase.co",
  "sb_publishable_yROKuvppBKGe-bdXd_6hzQ_w2V2v77i"
);

async function register() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signUp({
    email: email,
    password: password
  });

  console.log("REGISTER:", data, error);

  if (error) {
    alert("FOUT: " + error.message);
  } else {
    alert("REGISTER GELUKT");
  }
}

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email: email,
    password: password
  });

  console.log("LOGIN:", data, error);

  if (error) {
    alert("FOUT: " + error.message);
  } else {
    alert("LOGIN GELUKT");
  }
}
</script>

</body>
</html>
